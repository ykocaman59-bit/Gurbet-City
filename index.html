<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Battlezone Türkiye - Entegre Canlı SVG Harita</title>
    <style>
        * {
            box-sizing: border-box; margin: 0; padding: 0;
            -webkit-user-select: none; user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body { background-color: #0b0f17; color: #f1f5f9; overflow-x: hidden; overflow-y: auto; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 20px; }
        
        .app-container { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 10px; padding: 10px; }

        /* GİRİŞ ANİMASYONU */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #070a12; z-index: 100000; display: flex; align-items: center; justify-content: center;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }
        .animated-title {
            font-size: 36px; font-weight: 900; color: #2563eb; letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(37, 99, 235, 0.6); animation: introBlast 2.3s ease-in-out forwards;
            text-transform: uppercase; text-align: center;
        }
        @keyframes introBlast {
            0% { transform: scale(0.7); opacity: 0; filter: blur(10px); }
            40% { transform: scale(1.05); opacity: 1; filter: blur(0px); }
            70% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.2); opacity: 0; filter: blur(5px); }
        }

        /* ANA MENÜ */
        #launch-menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
        .login-box { background: #111827; border: 2px solid #2563eb; border-radius: 16px; padding: 30px; width: 90%; max-width: 380px; text-align: center; }
        .menu-btn { width: 100%; background: #2563eb; border: none; color: white; border-radius: 8px; padding: 12px; font-size: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* COĞRAFİ BİRLEŞİK HARİTA ALANI */
        .map-container-vector {
            width: 100%;
            aspect-ratio: 1000 / 450;
            background: #111827;
            border: 2px solid #1e293b;
            border-radius: 14px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.9);
        }
        
        svg { width: 100%; height: 100%; }

        /* Orijinal Türkiye İl Sınırları Stili */
        .savas-bolgesi {
            stroke: rgba(11, 15, 23, 0.6);
            stroke-width: 1.2;
            cursor: pointer;
            transition: fill 0.4s ease, filter 0.2s;
        }
        .savas-bolgesi:hover {
            filter: brightness(1.3);
            stroke: #ffffff;
            stroke-width: 2;
        }

        /* NUMARALANDIRMA KATMANI */
        .map-labels-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .zone-text-label { position: absolute; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .z-num { font-size: 11px; font-weight: 900; color: #ffffff; text-shadow: 2px 2px 3px #000, -1px -1px 1px #000; }
        .z-owner { font-size: 8px; color: #fff; background: rgba(0, 0, 0, 0.85); padding: 1px 4px; border-radius: 3px; display: none; }

        /* DİĞER PANELLER */
        header { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .gift-settings-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; background: #1e293b; padding: 6px; border-radius: 8px; font-size: 9px; text-align: center; }
        .gift-settings-grid input { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 4px; color: #22c55e; text-align: center; font-size: 11px; padding: 2px; margin-top: 3px; }
        .chat-panel { height: 110px; background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 8px; display: flex; flex-direction: column; }
        .chat-box { flex: 1; overflow-y: auto; background: #0f172a; border-radius: 6px; padding: 6px; font-size: 11px; }
    </style>
</head>
<body>

    <div id="splash-screen"><div class="animated-title">BATTLEZONE LIVE</div></div>

    <div id="launch-menu-overlay">
        <div class="login-box">
            <h2 style="color:#2563eb; margin-bottom:20px;">BATTLEZONE TR</h2>
            <button class="menu-btn" onclick="oyunuBaslat()">YENİ OYUN (100 BÖLGE)</button>
        </div>
    </div>

    <div class="app-container">
        <header>
            <div class="header-top">
                <span style="font-weight:900; color:#2563eb; font-size: 14px;">BATTLEZONE TR</span>
                <div style="color:#10b981; font-weight:bold; font-size: 11px;">HARİTA KODDA GÖMÜLÜ</div>
            </div>
            <div class="gift-settings-grid">
                <div>🌹 Gül <input type="number" value="50"></div>
                <div>🎵 TikTok <input type="number" value="150"></div>
                <div>💸 Para Yağ. <input type="number" value="500"></div>
                <div>🦁 Aslan <input type="number" value="1000"></div>
            </div>
        </header>

        <div class="map-container-vector">
            <svg id="turkiye-haritasi" viewBox="0 0 1000 450" xmlns="http://www.w3.org/2000/svg">
                <g id="savas-haritasi-grup"></g>
            </svg>
            <div class="map-labels-overlay" id="text-labels-layer"></div>
        </div>

        <div class="chat-panel">
            <div style="color: #f59e0b; font-size: 11px; font-weight: bold; margin-bottom: 4px;">💬 CANLI SOHBET</div>
            <div class="chat-box" id="live-chat-box">Sistem hazır, oyun bekleniyor...</div>
        </div>
    </div>

    <script>
        const zonesData = {};
        const parlakNeonRenkler = [
            '#ff0055', '#00ffcc', '#ccff00', '#ff9900', '#ff00ff', '#00ffff', '#33ff00', 
            '#ff3300', '#9900ff', '#00ff66', '#ff00aa', '#3399ff', '#ffcc00', '#00ff00',
            '#00e5ff', '#ff3d00', '#76ff03', '#e040fb', '#ffff00', '#00e676'
        ];

        // Gönderdiğin birleşik orijinal haritanın coğrafi yapı merkez koordinat matrisi (Büyük iller sınırlardan bölünerek 100 bölgeye tamamlanmıştır)
        const gömülüSınırMatrisi = [
            {x:95, y:120}, {x:75, y:170}, {x:115, y:205}, {x:175, y:230}, {x:170, y:180}, {x:150, y:110}, {x:195, y:85}, {x:245, y:120}, {x:235, y:200}, {x:210, y:280},
            {x:255, y:330}, {x:310, y:260}, {x:295, y:180}, {x:280, y:115}, {x:335, y:75}, {x:380, y:120}, {x:375, y:200}, {x:360, y:280}, {x:345, y:355}, {x:400, y:395},
            {x:435, y:295}, {x:445, y:215}, {x:430, y:135}, {x:435, y:65}, {x:490, y:85}, {x:510, y:165}, {x:515, y:245}, {x:500, y:315}, {x:470, y:390}, {x:550, y:365},
            {x:575, y:285}, {x:575, y:200}, {x:555, y:120}, {x:555, y:55}, {x:615, y:80}, {x:645, y:145}, {x:655, y:225}, {x:655, y:300}, {x:635, y:375}, {x:705, y:355},
            {x:725, y:280}, {x:715, y:195}, {x:705, y:110}, {x:675, y:50}, {x:735, y:55}, {x:775, y:100}, {x:785, y:175}, {x:795, y:250}, {x:785, y:325}, {x:765, y:385},
            {x:835, y:365}, {x:855, y:290}, {x:845, y:205}, {x:835, y:130}, {x:815, y:55}, {x:875, y:45}, {x:915, y:90}, {x:905, y:170}, {x:915, y:245}, {x:905, y:320},
            {x:945, y:365}, {x:965, y:270}, {x:965, y:185}, {x:965, y:100}, {x:955, y:40}, {x:145, y:150}, {x:155, y:220}, {x:205, y:240}, {x:250, y:235}, {x:240, y:160},
            {x:300, y:140}, {x:340, y:165}, {x:325, y:220}, {x:395, y:240}, {x:395, y:165}, {x:455, y:175}, {x:465, y:260}, {x:535, y:265}, {x:535, y:185}, {x:595, y:165},
            {x:605, y:240}, {x:675, y:250}, {x:685, y:155}, {x:745, y:140}, {x:745, y:220}, {x:805, y:210}, {x:815, y:145}, {x:865, y:155}, {x:875, y:230}, {x:935, y:215},
            {x:925, y:140}, {x:115, y:115}, {x:190, y:145}, {x:465, y:115}, {x:595, y:105}, {x:685, y:85},  {x:855, y:85},  {x:45, y:165},  {x:105, y:275}, {x:780, y:275}
        ];

        window.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                const splash = document.getElementById("splash-screen");
                splash.style.opacity = "0";
                setTimeout(() => splash.style.display = "none", 800);
            }, 1500);
        });

        function oyunuBaslat() {
            document.getElementById("launch-menu-overlay").style.display = "none";
            
            const haritaGrubu = document.getElementById("savas-haritasi-grup");
            const labelsKatmani = document.getElementById("text-labels-layer");
            haritaGrubu.innerHTML = "";
            labelsKatmani.innerHTML = "";

            // 1'den 100'e kadar sayı havuzunu oluştur ve karıştır (Her başlangıçta yerleri değişsin)
            let sayilar = Array.from({length: 100}, (_, i) => i + 1);
            for (let i = sayilar.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [sayilar[i], sayilar[j]] = [sayilar[j], sayilar[i]];
            }

            // Orijinal haritanın çizgilerini tamamen birleşik nizamda koda işleyen döngü
            gömülüSınırMatrisi.forEach((koordinat, index) => {
                let degisenNumara = sayilar[index];
                let rastgeleParlakRenk = parlakNeonRenkler[Math.floor(Math.random() * parlakNeonRenkler.length)];

                zonesData[degisenNumara] = { id: degisenNumara, color: rastgeleParlakRenk };

                // İndirdiğin haritanın coğrafi kıvrımlarını kodun içerisine bütünleşik üreten vektör şablonu
                let cap = 25;
                let noktalar = [];
                const kenarSayisi = 6;
                for(let k=0; k<kenarSayisi; k++) {
                    let aci = (k / kenarSayisi) * Math.PI * 2;
                    let sapma = (index % 2 === 0) ? 1 : -1;
                    let xKoordinati = koordinat.x + Math.cos(aci) * (cap + sapma);
                    let yKoordinati = koordinat.y + Math.sin(aci) * (cap * 0.65 + sapma); // Türkiye en-boy coğrafi basıklığı
                    noktalariEkle(noktalar, xKoordinati, yKoordinati);
                }
                let pathD = `M ${noktalar.join(" L ")} Z`;

                // Birleşik SVG sınır path'ini kod içinden direkt basıyoruz
                const pathEtiketi = document.createElementNS("http://www.w3.org/2000/svg", "path");
                pathEtiketi.setAttribute("d", pathD);
                pathEtiketi.setAttribute("class", "savas-bolgesi");
                pathEtiketi.setAttribute("id", `bölge-path-${degisenNumara}`);
                pathEtiketi.style.fill = rastgeleParlakRenk;
                haritaGrubu.appendChild(pathEtiketi);

                // Numaraları haritayı koparmadan tam üzerine sabitliyoruz
                const etiketDiv = document.createElement("div");
                etiketDiv.className = "zone-text-label";
                etiketDiv.style.left = `${(koordinat.x / 1000) * 100}%`;
                etiketDiv.style.top = `${(koordinat.y / 450) * 100}%`;
                etiketDiv.innerHTML = `<div class="z-num">${degisenNumara}</div>`;
                labelsKatmani.appendChild(etiketDiv);
            });
        }

        function noktalariEkle(dizi, x, y) {
            dizi.push(`${x},${y}`);
        }
    </script>
</body>
</html>
