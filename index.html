<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cootv Real Warzone TR Map</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        body { background-color: #05070c; color: #f1f5f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 5px; }
        
        .main-frame {
            width: 100%;
            max-width: 450px;
            background: #0f141c;
            border: 2px solid #1e293b;
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* YAYINDAKİ BÜTÜNÜ ASLA BOZULMAYAN COĞRAFİ HARİTA ALANI */
        .map-container {
            width: 100%;
            position: relative;
            background: #14112e; /* Yayındaki koyu lacivert/mor gece tonu */
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 1000 / 520;
        }

        svg { width: 100%; height: 100%; display: block; }

        /* Yayındaki her ilin kendi sınır hattı (Asla kopmaz, ayrılmaz) */
        .tr-sector {
            stroke: #020617; /* İlleri ayıran net keskin siyah çizgiler */
            stroke-width: 1.2;
            cursor: pointer;
            transition: fill 0.2s, filter 0.2s;
        }
        .tr-sector:hover { filter: brightness(1.3); }

        /* Sayıların tam illerin merkezine basıldığı katman */
        .labels-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }

        .zone-number-tag {
            position: absolute;
            transform: translate(-50%, -50%);
            font-size: 10px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
        }

        /* Saldırı anındaki patlama efekti */
        @keyframes sectorFlash {
            0% { filter: brightness(1); }
            50% { filter: brightness(2.5); }
            100% { filter: brightness(1); }
        }
        .attacked { animation: sectorFlash 0.4s ease-out; }
    </style>
</head>

        document.addEventListener("DOMContentLoaded", () => {
            const anaGövde = document.getElementById("tr-full-map-group");
            const etiketKatmanı = document.getElementById("labels-layer");

            // Numaraları 1'den başlayıp 81'e kadar karıştırarak dağıtma
            let karisikSayilar = Array.from({length: fullTrData.length}, (_, i) => i + 1);
            karisikSayilar.sort(() => Math.random() - 0.5);

            fullTrData.forEach((il, sira) => {
                let degisenNumara = karisikSayilar[sira];
                let rastgeleRenk = cootvRenkleri[Math.floor(Math.random() * cootvRenkleri.length)];

                // Sektör Çizgisi (Path) Ekleme
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", il.d);
                path.setAttribute("class", "tr-sector");
                path.setAttribute("id", `sec-${degisenNumara}`);
                path.style.fill = rastgeleRenk;

                // Tıklayınca parlayıp renk değiştirme simülasyonu
                path.addEventListener("click", () => {
                    path.classList.add("attacked");
                    setTimeout(() => path.classList.remove("attacked"), 400);
                    path.style.fill = cootvRenkleri[Math.floor(Math.random() * cootvRenkleri.length)];
                });

                anaGövde.appendChild(path);

                // Numarayı tam o ilin coğrafi merkez koordinatına yerleştirme
                const etiket = document.createElement("div");
                etiket.className = "zone-number-tag";
                etiket.style.left = `${(il.cx / 1000) * 100}%`;
                etiket.style.top = `${(il.cy / 520) * 100}%`;
                etiket.innerHTML = degisenNumara;

                etiketKatmanı.appendChild(etiket);
            });
