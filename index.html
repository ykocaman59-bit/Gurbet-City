<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATTLEZONE LIVE</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            overflow: hidden;
            height: 100vh;
        }

        /* --- GİRİŞ MENÜSÜ OVERLAY --- */
        #launch-menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0f19;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .menu-box {
            background: #111827;
            border: 2px solid #1e3a8a;
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 25px rgba(30, 58, 138, 0.3);
        }

        .menu-title {
            font-size: 24px;
            font-weight: bold;
            color: #3b82f6;
            margin-bottom: 25px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .menu-btn {
            width: 100%;
            background: linear-gradient(135deg, #1e40af, #1d4ed8);
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .menu-btn:active {
            transform: scale(0.98);
        }

        .menu-btn.secondary {
            background: linear-gradient(135deg, #d97706, #b45309);
        }

        /* --- KULLANICI ADI GİRİŞ PANELİ --- */
        #username-panel {
            display: none;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            background-color: #1f2937;
            border: 1px solid #4b5563;
            padding: 12px;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #3b82f6;
        }

        /* --- OYUN ANA ARAYÜZÜ --- */
        .game-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
        }

        /* Üst Bar */
        .top-bar {
            background-color: #111827;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1f2937;
        }

        .brand {
            font-weight: bold;
            color: #ef4444;
            font-size: 14px;
        }

        .status-badge {
            font-size: 12px;
            font-weight: 600;
            background-color: #1f2937;
            padding: 6px 12px;
            border-radius: 20px;
            color: #9ca3af;
        }

        .exit-btn {
            background-color: #dc2626;
            color: white;
            border: none;
            padding: 6px 15px;
            font-size: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Canlı Sohbet Alanı */
        .chat-section {
            background-color: #111827;
            margin: 10px;
            border-radius: 12px;
            padding: 12px;
            flex: 1;
            max-height: 220px;
            display: flex;
            flex-direction: column;
            border: 1px solid #1f2937;
        }

        .chat-title {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .chat-msg {
            animation: fadeIn 0.2s ease-out;
        }

        .chat-user {
            color: #60a5fa;
            font-weight: bold;
        }

        /* Harita Alanı (1-80 Butonlar) */
        .map-section {
            flex: 2;
            overflow-y: auto;
            padding: 0 10px 10px 10px;
        }

        .map-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .region-btn {
            background-color: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #f3f4f6;
            cursor: pointer;
            padding: 2px;
        }

        .reg-num {
            font-size: 14px;
            font-weight: bold;
        }

        .reg-user {
            font-size: 9px;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            text-align: center;
            font-weight: 500;
        }

        /* --- POP-UP MODAL (BAŞARI SIRALAMASI) --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.75);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-box {
            background-color: #111827;
            border: 2px solid #d97706;
            border-radius: 16px;
            width: 100%;
            max-width: 360px;
            padding: 20px;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #d97706;
            text-transform: uppercase;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #9ca3af;
            font-size: 20px;
            cursor: pointer;
        }

        .leaderboard-list {
            list-style: none;
            max-height: 250px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .leaderboard-item {
            background-color: #1f2937;
            padding: 10px 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .no-data {
            color: #9ca3af;
            text-align: center;
            font-size: 13px;
            padding: 20px 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(3px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- --- GİRİŞ VE ANA MENÜ OVERLAY --- -->
    <div id="launch-menu-overlay">
        <!-- Ana Tercih Paneli -->
        <div id="main-menu-panel" class="menu-box">
            <div class="menu-title">BATTLEZONE LIVE</div>
            <button class="menu-btn" onclick="showUsernamePanel()">YENI OYUN (YAYINA BAĞLAN)</button>
            <button class="menu-btn secondary" onclick="openLeaderboard()">🏆 BAŞARI SIRALAMASI</button>
        </div>

        <!-- Kullanıcı Adı Giriş Paneli -->
        <div id="username-panel" class="menu-box">
            <div class="menu-title">BATTLEZONE LIVE</div>
            <div class="input-group">
                <label>TIKTOK CANLI YAYIN KULLANICI ADI</label>
                <input type="text" id="initial-username" placeholder="Örm: yayinci_adi" autocomplete="off">
            </div>
            <button class="menu-btn" id="connect-trigger-btn" onclick="connectToTikTokLive()">YAYINI DOĞRULA & BAŞLAT ⚔️</button>
            <button class="menu-btn secondary" style="background: #374151;" onclick="goBackToMainMenu()">← GERI DÖN</button>
        </div>
    </div>

    <!-- --- OYUNUN ASIL ANA EKRANI --- -->
    <div class="game-container">
        <!-- Üst Bilgi Çubuğu -->
        <div class="top-bar">
            <div class="brand">COOTV <span style="color:white; font-size:11px; background:#dc2626; padding:2px 6px; border-radius:4px; margin-left:5px;">CANLI</span></div>
            <div class="status-badge" id="status-text">BAĞLANTI YOK</div>
            <button class="exit-btn" onclick="window.location.reload();">Çıkış</button>
        </div>

        <!-- Canlı Sohbet Simülasyon Penceresi -->
        <div class="chat-section">
            <div class="chat-title">💬 CANLI SOHBET AKIŞI</div>
            <div class="chat-messages" id="chat-box-stream">
                <div class="no-data" id="chat-placeholder" style="padding: 10px 0;">Henüz gelen yorum yok...</div>
            </div>
        </div>

        <!-- Savaş Haritası (80 Bölge) -->
        <div class="map-section">
            <div class="map-grid" id="map-grid-container">
                <!-- Butonlar JavaScript ile 1'den 80'e otomatik dolacak -->
            </div>
        </div>
    </div>

    <!-- --- BAŞARI SIRALAMASI MODAL --- -->
    <div class="modal-overlay" id="leaderboard-modal">
        <div class="modal-box">
            <button class="close-modal" onclick="closeLeaderboard()">×</button>
            <div class="modal-header">🏆 BAŞARI SIRALAMASI</div>
            <ul class="leaderboard-list" id="leaderboard-list-render">
                <li class="no-data" id="leaderboard-placeholder">Aktif oyuncu verisi bulunmuyor.</li>
            </ul>
        </div>
    </div>

    <!-- --- SİSTEM MOTORU VE MANTIK KODLARI --- -->
    <script>
        const mapRegions = {};
        const leaderboardData = {};

        // Sayfa açıldığında 80 bölgeyi oluştur
        function createMapGrid() {
            const container = document.getElementById("map-grid-container");
            container.innerHTML = "";
            for (let i = 1; i <= 80; i++) {
                mapRegions[i] = { owner: null, color: null };
                
                const btn = document.createElement("button");
                btn.className = "region-btn";
                btn.id = `region-${i}`;
                btn.innerHTML = `<span class="reg-num">${i}</span><span class="reg-user"></span>`;
                container.appendChild(btn);
            }
        }

        function showUsernamePanel() {
            document.getElementById("main-menu-panel").style.display = "none";
            document.getElementById("username-panel").style.display = "block";
        }

        function goBackToMainMenu() {
            document.getElementById("username-panel").style.display = "none";
            document.getElementById("main-menu-panel").style.display = "block";
        }

        function openLeaderboard() {
            document.getElementById("leaderboard-modal").style.display = "flex";
        }

        function closeLeaderboard() {
            document.getElementById("leaderboard-modal").style.display = "none";
        }

        // --- BUTONA BASILDIĞINDA KODULAR'A VERİ FIRLATAN KÖPRÜ ---
        function connectToTikTokLive() {
            const inputField = document.getElementById("initial-username");
            const username = inputField.value.trim();

            if (!username) {
                alert("Lütfen geçerli bir TikTok kullanıcı adı girin!");
                return;
            }

            const btn = document.getElementById("connect-trigger-btn");
            btn.innerText = "YAYIN SORGULANIYOR...";
            btn.disabled = true;

            // Eğer uygulama Kodular WebView içindeyse sistemi tetikle
            if (window.AppInventor) {
                // Kodular'daki .WebViewStringChange bloğunu çalıştırır ve ismi oraya yollar
                window.AppInventor.setWebViewString(username);
                
                // Menüyü kapat, oyunu göster
                document.getElementById("launch-menu-overlay").style.display = "none";
                
                // Üst bar durumunu güncelle
                const statusText = document.getElementById("status-text");
                statusText.innerText = `BAĞLANDI: @${username.toUpperCase()}`;
                statusText.style.color = "#10b981";
            } else {
                alert("Bu oyunun canlı bağlantı özelliği sadece APK uygulaması içinde çalışır!");
                btn.innerText = "YAYINI DOĞRULA & BAŞLAT ⚔️";
                btn.disabled = false;
            }
        }

        // --- KODULAR TARAFININ CHAT GELDİKÇE TETİKLEYECEĞİ KÜRESEL FONKSİYONLAR ---
        
        // 1. Yeni Yorum Geldiğinde Çalışacak Bölüm
        window.handleIncomingChat = function(user, comment) {
            // Ekrana yorum kaydını bas
            const chatBox = document.getElementById("chat-box-stream");
            const placeholder = document.getElementById("chat-placeholder");
            if (placeholder) placeholder.remove();

            const msgDiv = document.createElement("div");
            msgDiv.className = "chat-msg";
            msgDiv.innerHTML = `<span class="chat-user">@${user}:</span> <span style="color:white;">${comment}</span>`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            // Komut analizi: Örn "join 45"
            const msg = comment.toLowerCase().trim();
            if (msg.startsWith("join ")) {
                const regionId = parseInt(msg.replace("join ", "").trim());
                if (regionId >= 1 && regionId <= 80) {
                    processRegionCapture(regionId, user);
                }
            }
        };

        // 2. Yeni Hediye Geldiğinde Çalışacak Bölüm
        window.handleIncomingGift = function(user, giftName) {
            const chatBox = document.getElementById("chat-box-stream");
            const placeholder = document.getElementById("chat-placeholder");
            if (placeholder) placeholder.remove();

            const msgDiv = document.createElement("div");
            msgDiv.className = "chat-msg";
            msgDiv.innerHTML = `<span class="chat-user" style="color:#f59e0b;">🎁 @${user}:</span> <span style="color:#f59e0b; font-weight:bold;">${giftName} gönderdi!</span>`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            
            // Hediye atana ödül olarak haritada rastgele 3 bölge hediye etme mekanizması
            for(let k = 0; k < 3; k++) {
                const randomRegion = Math.floor(Math.random() * 80) + 1;
                processRegionCapture(randomRegion, user);
            }
        };

        // --- HARİTA BOYAMA VE LİSTE GÜNCELLEME SİHRİ ---
        function processRegionCapture(regionId, username) {
            const regionBtn = document.getElementById(`region-${regionId}`);
            if (!regionBtn) return;

            // Kullanıcıya özel sabit rastgele renk üret
            let userColor = mapRegions[regionId].color;
            if (!userColor || mapRegions[regionId].owner !== username) {
                userColor = '#' + Math.floor(Math.random()*16777215).toString(16);
            }

            // Önceki sahibinden skoru düş
            const oldOwner = mapRegions[regionId].owner;
            if (oldOwner && leaderboardData[oldOwner]) {
                leaderboardData[oldOwner]--;
                if (leaderboardData[oldOwner] <= 0) delete leaderboardData[oldOwner];
            }

            // Yeni sahibi kaydet ve rengini ata
            mapRegions[regionId] = { owner: username, color: userColor };
            regionBtn.style.backgroundColor = userColor;
            
            // Buton altındaki yazıyı güncelle
            const userSpan = regionBtn.querySelector(".reg-user");
            if (userSpan) userSpan.innerText = username;

            // Yeni sahibine skor ekle
            if (!leaderboardData[username]) leaderboardData[username] = 0;
            leaderboardData[username]++;

            renderLeaderboardHtml();
        }

        function renderLeaderboardHtml() {
            const listContainer = document.getElementById("leaderboard-list-render");
            if (!listContainer) return;

            listContainer.innerHTML = "";
            const sortedPlayers = Object.entries(leaderboardData).sort((a, b) => b[1] - a[1]);

            if (sortedPlayers.length === 0) {
                listContainer.innerHTML = '<li class="no-data">Aktif oyuncu verisi bulunmuyor.</li>';
                return;
            }

            sortedPlayers.forEach(([player, score], index) => {
                const li = document.createElement("li");
                li.className = "leaderboard-item";
                li.innerHTML = `<span>${index + 1}. @${player}</span> <strong>${score} Bölge</strong>`;
                listContainer.appendChild(li);
            });
        }

        // Haritayı yükle
        window.onload = function() {
            createMapGrid();
        };
    </script>
</body>
</html>
