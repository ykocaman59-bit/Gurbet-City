<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battlezone Live - 100 Bölge Savaş Modu</title>
    <style>
        * {
            box-sizing: border-box; margin: 0; padding: 0;
            -webkit-user-select: none; user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body { background-color: #0b0f17; color: #f1f5f9; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #070a12; z-index: 100000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s, visibility 0.5s;
        }
        .animated-title { font-size: 32px; font-weight: 900; color: #2563eb; letter-spacing: 3px; text-shadow: 0 0 15px rgba(37, 99, 235, 0.5); }

        #launch-menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
        .login-box { background: #111827; border: 2px solid #2563eb; border-radius: 16px; padding: 30px; width: 90%; max-width: 400px; text-align: center; }
        .login-box h2 { color: #2563eb; margin-bottom: 20px; font-size: 24px; text-transform: uppercase; }
        
        .menu-btn { width: 100%; background: #1f2937; border: 1px solid #4b5563; color: white; border-radius: 8px; padding: 12px; font-size: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .menu-btn.primary { background: #2563eb; border: none; margin-top: 15px; }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; color: #9ca3af; font-size: 12px; margin-bottom: 6px; text-transform: uppercase; }
        .input-group input { width: 100%; background: #1f2937; border: 1px solid #4b5563; border-radius: 8px; padding: 12px; color: #fff; font-size: 16px; outline: none; }

        .custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 10000; align-items: center; justify-content: center; }
        .modal-box { background: #111827; padding: 25px; border-radius: 16px; width: 85%; max-width: 360px; text-align: center; border: 2px solid #ef4444; }

        header { background: #111827; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1f2937; }
        .live-badge { background: #ef4444; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .main-title { font-size: 15px; font-weight: 700; color: #fbbf24; }
        
        .game-container { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 10px; height: calc(100vh - 90px); }
        .panel { background: #111827; border: 1px solid #1f2937; border-radius: 12px; display: flex; flex-direction: column; padding: 12px; }
        .panel-title { color: #f59e0b; font-size: 13px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        
        .left-side { width: 240px; shrink: 0; }
        .chat-box { flex: 1; overflow-y: auto; background: #0f172a; border: 1px solid #1e293b; border-radius: 8px; padding: 8px; }
        .chat-msg { font-size: 12px; margin-bottom: 6px; word-break: break-all; }
        .chat-user { font-weight: bold; color: #3b82f6; }

        /* TÜRKİYE HARİTASI GİBİ GENİŞ (YATAY) GÖRÜNMESİ İÇİN 14 SÜTUNLU YAPTIK */
        .center-side { flex: 1; display: flex; align-items: center; justify-content: center; background: #0f172a; border-radius: 12px; border: 1px solid #1e293b; padding: 8px; overflow: hidden; }
        .organic-map-container { display: grid; grid-template-columns: repeat(14, 1fr); gap: 4px; width: 100%; height: 100%; max-height: 460px; }
        
        .map-zone { 
            background: #1f2937; border: 1px solid #374151; color: #fff; font-size: 11px; font-weight: bold; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 5px;
            min-height: 38px; transition: background-color 0.3s; position: relative;
        }
        .zone-number { font-size: 13px; font-weight: 900; }
        .zone-user { font-size: 8px; color: #fbbf24; text-align: center; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 1px; }
        
        footer { background: #111827; padding: 10px 20px; border-top: 1px solid #1f2937; display: flex; justify-content: space-between; font-size: 12px; color: #9ca3af; }
    </style>
</head>
<body>

    <div id="splash-screen"><div class="animated-title">BATTLEZONE LIVE</div></div>

    <div id="custom-alert" class="custom-modal">
        <div class="modal-box">
            <h3 style="color:#ef4444; margin-bottom:10px;">SİSTEM UYARISI</h3>
            <p id="alert-msg">Mesaj...</p>
            <button style="background:#ef4444; color:white; border:none; padding:10px 20px; border-radius:6px; font-weight:bold; cursor:pointer; margin-top:15px; width:100%;" onclick="closeCustomAlert()">TAMAM</button>
        </div>
    </div>

    <div id="launch-menu-overlay">
        <div class="login-box">
            <h2>BATTLEZONE LIVE</h2>
            <div class="input-group">
                <label>TikTok Canlı Yayın Kullanıcı Adı</label>
                <input type="text" id="initial-username" placeholder="Örn: flyking6924" autocomplete="off">
            </div>
            <button class="menu-btn primary" id="connect-trigger-btn" onclick="connectToTikTokPlayStore()">YAYINI BAĞLA & OYUNU BAŞLAT ⚔️</button>
        </div>
    </div>

    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <span style="font-weight:900; color:#2563eb;" id="header-logo-text">YÜKLENİYOR...</span>
            <span class="live-badge">CANLI</span>
        </div>
        <div class="main-title">Komutlar: join [no] | saldır [no] [no]</div>
        <button style="background:#ef4444; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-weight:bold; font-size:12px;" onclick="location.reload()">Bağlantıyı Kes</button>
    </header>

    <div class="game-container">
        <div class="panel left-side">
            <div class="panel-title">💬 CANLI SOHBET</div>
            <div class="chat-box" id="live-chat-box"></div>
        </div>
        <div class="panel center-side">
            <div class="organic-map-container" id="organic-map"></div>
        </div>
    </div>

    <footer>
        <div>Durum: <span id="status-text" style="color:#ef4444; font-weight:bold;">BAĞLANTI YOK</span></div>
        <div>Harita: 100 Bölge (Türkiye En-Boy Modu)</div>
    </footer>

    <script>
        const zonesData = {};
        const maxZones = 100; // Tam 100 bölgeye sabitlendi
        let updateInterval = null;

        window.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                const splash = document.getElementById("splash-screen");
                splash.style.opacity = "0";
                setTimeout(() => splash.style.display = "none", 500);
            }, 1500);
        });

        function showCustomAlert(msg) {
            document.getElementById('alert-msg').innerText = msg;
            document.getElementById('custom-alert').style.display = 'flex';
        }
        
        function closeCustomAlert() {
            document.getElementById('custom-alert').style.display = 'none';
        }

        // 100 BÖLGELİ VE TÜRKİYE COĞRAFİ ŞEKLİNE BENZER HARİTA TEMELİ
        function initializeEmptyMap() {
            const mapContainer = document.getElementById("organic-map");
            mapContainer.innerHTML = "";

            for(let i = 1; i <= maxZones; i++) {
                zonesData[i] = { id: i, owner: "", troops: 0 };
                const zone = document.createElement("div");
                zone.className = "map-zone"; 
                zone.id = `zone-${i}`;
                zone.innerHTML = `<div class="zone-number">${i}</div><div class="zone-user" id="zone-user-${i}">-</div>`;
                mapContainer.appendChild(zone);
            }
        }

        function connectToTikTokPlayStore() {
            const username = document.getElementById("initial-username").value.trim().toLowerCase();
            if(!username) {
                showCustomAlert("Lütfen geçerli bir TikTok kullanıcı adı girin!");
                return;
            }

            const btn = document.getElementById("connect-trigger-btn");
            btn.innerText = "YAYINA BAĞLANILIYOR...";
            btn.disabled = true;

            document.getElementById("header-logo-text").innerText = username.toUpperCase();
            initializeEmptyMap();
            document.getElementById("launch-menu-overlay").style.display = "none";
            document.getElementById("status-text").innerText = `CANLI BAĞLANTI: @${username.toUpperCase()}`;
            document.getElementById("status-text").style.color = "#10b981";
            
            startDataPolling(username);
        }

        function startDataPolling(username) {
            if(updateInterval) clearInterval(updateInterval);
            
            const eventSourceUrl = `https://tiktok-chat-reader.onrender.com/api/stream/events?username=${username}`;
            
            try {
                const eventSource = new EventSource(eventSourceUrl);
                
                eventSource.onmessage = function(event) {
                    const data = JSON.parse(event.data);
                    if(data.type === "chat") {
                        handleIncomingChat(data.uniqueId, data.comment);
                    } else if (data.type === "gift") {
                        handleIncomingGift(data.uniqueId, data.giftName);
                    }
                };
                
                eventSource.onerror = function() {
                    setTimeout(() => startDataPolling(username), 5000);
                };
            } catch(e) {
                console.log("Bağlantı tüneli bekleniyor...");
            }
        }

        function handleIncomingChat(username, comment) {
            const chatBox = document.getElementById("live-chat-box");
            chatBox.innerHTML += `<div class="chat-msg"><span class="chat-user">${username}:</span> ${comment}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            const message = comment.trim().toLowerCase();
            
            // 1. OYUNA KATILMA (BOŞ YER KAPMA)
            if(message.startsWith("join")) {
                const parts = message.split(" ");
                const zoneId = parseInt(parts[1]);
                if(!isNaN(zoneId) && zoneId >= 1 && zoneId <= maxZones) {
                    const zone = zonesData[zoneId];
                    if(zone && zone.owner === "") { 
                        zone.owner = username;
                        zone.troops = 20;
                        document.getElementById(`zone-${zoneId}`).style.backgroundColor = "#2563eb";
                        document.getElementById(`zone-user-${zoneId}`).innerText = `${username} (${zone.troops})`;
                    }
                }
            }
            
            // 2. GERÇEK SAVAŞ MEKANİĞİ
            if(message.startsWith("saldır") || message.startsWith("saldir")) {
                const parts = message.split(" ");
                const fromZone = parseInt(parts[1]);
                const toZone = parseInt(parts[2]);
                
                if(!isNaN(fromZone) && !isNaN(toZone) && fromZone >= 1 && fromZone <= maxZones && toZone >= 1 && toZone <= maxZones) {
                    const attacker = zonesData[fromZone];
                    const defender = zonesData[toZone];
                    
                    if(attacker && defender && attacker.owner === username && attacker.troops > 5) {
                        const attackForce = attacker.troops - 1;
                        attacker.troops = 1;
                        document.getElementById(`zone-user-${fromZone}`).innerText = `${username} (1)`;
                        
                        if(defender.owner === "") {
                            defender.owner = username;
                            defender.troops = attackForce;
                            document.getElementById(`zone-${toZone}`).style.backgroundColor = "#2563eb";
                        } else if(defender.owner === username) {
                            defender.troops += attackForce;
                        } else {
                            if(attackForce > defender.troops) {
                                defender.owner = username;
                                defender.troops = attackForce - defender.troops;
                                document.getElementById(`zone-${toZone}`).style.backgroundColor = "#2563eb";
                            } else {
                                defender.troops -= attackForce;
                            }
                        }
                        document.getElementById(`zone-user-${toZone}`).innerText = `${defender.owner} (${defender.troops})`;
                    }
                }
            }
        }

        function handleIncomingGift(username, giftName) {
            const chatBox = document.getElementById("live-chat-box");
            chatBox.innerHTML += `<div class="chat-msg" style="color:#ef4444;"><span class="chat-user">${username}:</span> 🎁 ${giftName} gönderdi!</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            let addedTroops = 0;
            if(giftName === "Rose" || giftName === "Gül") addedTroops = 50;
            else if(giftName === "TikTok") addedTroops = 100;
            else if(giftName === "Lion" || giftName === "Aslan") addedTroops = 1000;

            if(addedTroops > 0) {
                for(let id in zonesData) {
                    if(zonesData[id].owner === username) {
                        zonesData[id].troops += addedTroops;
                        document.getElementById(`zone-user-${id}`).innerText = `${username} (${zonesData[id].troops})`;
                    }
                }
            }
        }
    </script>
</body>
</html>
