<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Warzone Real Map</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        body { background-color: #05080c; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 5px; }
        
        .game-wrapper {
            width: 100%;
            max-width: 450px;
            background: #0d131a;
            border: 2px solid #1e293b;
            border-radius: 12px;
            padding: 5px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.7);
        }

        /* Fotoğraftaki orijinal harita görüntüsünün yerleştiği ana kutu */
        .map-viewport {
            width: 100%;
            position: relative;
            border-radius: 8px;
            overflow: hidden;
        }

        /* SENİN ATTIĞIN HARİTA RESMİNİN KENDİSİ (Kodun içine gömüldü) */
        .original-warzone-map {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Görünmez interaktif tıklama katmanı (Haritanın üstüne şeffaf cam gibi biner) */
        .click-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        /* Haritadaki renkli alanların tam üzerine gelen tıklama bölgeleri */
        .clickable-zone {
            position: absolute;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-size: 13px;
            font-weight: 900;
            /* Sayıların net okunması için kalın siyah dış hat konturu */
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
            cursor: pointer;
            padding: 10px;
            transition: transform 0.1s ease;
        }
        
        /* Tıklayınca numara büyür ve tepki verir */
        .clickable-zone:active {
            transform: translate(-50%, -50%) scale(1.5);
            color: #ff0055;
        }
    </style>
</head>
