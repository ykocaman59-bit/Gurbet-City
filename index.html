<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battlezone Live - TikTok Canlı Bağlantı Sistemi</title>
    
    <style>
        /* Tüm Metin Seçimlerini ve Kopyalamayı Engelle */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0f17;
            color: #f1f5f9;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 1. SİNEMATİK GİRİŞ ANİMASYONU (SPLASH SCREEN) */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #070a12;
            z-index: 100000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }

        .animated-title {
            font-size: 36px;
            font-weight: 900;
            color: #2563eb;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(37, 99, 235, 0.6);
            animation: introBlast 2.3s ease-in-out forwards;
        }

        @keyframes introBlast {
            0% { transform: scale(0.7); opacity: 0; filter: blur(10px); }
            40% { transform: scale(1.05); opacity: 1; filter: blur(0px); }
            70% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.2); opacity: 0; filter: blur(5px); }
        }

        /* 2. GİRİŞ VE ANA MENÜ EKRANI */
        #launch-menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease-in-out;
        }

        .login-box {
            background: #111827;
            border: 2px solid #2563eb;
            border-radius: 16px;
            padding: 35px 30px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.7);
        }

        .login-box h2 {
            color: #2563eb;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 26px;
        }

        .menu-btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-btn {
            width: 100%;
            background: #1f2937;
            border: 1px solid #4b5563;
            color: white;
            border-radius: 8px;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .menu-btn:hover {
            background: #2563eb;
            border-color: #3b82f6;
            transform: translateY(-2px);
        }

        .menu-btn.primary { background: #2563eb; border: none; }
        .menu-btn.primary:hover { background: #1d4ed8; }

        #connection-form { display: none; margin-top: 20px; text-align: left; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; color: #9ca3af; font-size: 12px; margin-bottom: 6px; text-transform: uppercase; }
        
        .input-group input {
            width: 100%;
            background: #1f2937;
            border: 1px solid #4b5563;
            border-radius: 8px;
            padding: 12px 16px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        .slider-wrapper { margin-top: 10px; margin-bottom: 20px; }
        .slider-val-display { float: right; color: #fbbf24; font-weight: bold; font-size: 14px; }
        .custom-slider { width: 100%; accent-color: #2563eb; cursor: pointer; margin-top: 8px; }

        /* ÖZEL PENCERELER (MODALLAR) */
        .custom-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .modal-box {
            background: #111827;
            padding: 25px;
            border-radius: 16px;
            width: 85%;
            max-width: 360px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
            position: relative;
        }

        .modal-box.alert-border { border: 2px solid #ef4444; text-align: center; }
        .modal-box.leader-border { border: 2px solid #fbbf24; }

        .modal-close-x { position: absolute; top: 12px; right: 15px; font-size: 20px; color: #9ca3af; cursor: pointer; font-weight: bold; }
        .modal-close-x:hover { color: #fff; }

        .modal-box h3 { margin-bottom: 15px; font-size: 20px; }
        .alert-border h3 { color: #ef4444; }
        .leader-border h3 { color: #fbbf24; text-align: center; }

        /* HARİTA VE PANEL YAPILARI */
        header { background: #111827; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1f2937; }
        .live-badge { background: #ef4444; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .main-title { font-size: 20px; font-weight: 800; color: #fbbf24; }
        
        .game-container { display: flex; flex: 1; overflow: hidden; padding: 12px; gap: 12px; }
        .panel { background: #111827; border: 1px solid #1f2937; border-radius: 12px; display: flex; flex-direction: column; padding: 15px; }
        .panel-title { color: #f59e0b; font-size: 13px; font-weight: bold; margin-bottom: 12px; text-transform: uppercase; }

        .left-side { width: 280px; gap: 12px; }
        .chat-box { flex: 1; overflow-y: auto; background: #0f172a; border: 1px solid #1e293b; border-radius: 8px; padding: 10px; }
        
        .center-side { flex: 1; display: flex; align-items: center; justify-content: center; background: #0f172a; border-radius: 12px; border: 1px solid #1e293b; padding: 20px; overflow: auto; }
        .organic-map-container { display: grid; grid-template-columns: repeat(10, 52px); grid-auto-rows: 46px; gap: 4px; }
        
        .map-zone {
            background: #1f2937;
            border: 1px solid #374151;
            color: #fff;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: background-color 0.3s, transform 0.2s;
        }
        .map-zone:nth-child(2n) { transform: translateY(12px); background: #1e293b; }
        .zone-user { font-size: 8px; color: #fbbf24; text-align: center; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .chat-msg { font-size: 12px; margin-bottom: 4px; word-break: break-all; }
        .chat-user { font-weight: bold; color: #3b82f6; }
        
        .modal-leaderboard-wrapper { background: #0f172a; border: 1px solid #1e293b; border-radius: 8px; max-height: 250px; overflow-y: auto; padding: 10px; }
        footer { background: #111827; padding: 10px 20px; border-top: 1px solid #1f2937; display: flex; justify-content: space-between; font-size: 12px; color: #9ca3af; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="animated-title">BATTLEZONE LIVE</div>
    </div>

    <div id="custom-alert" class="custom-modal">
        <div class="modal-box alert-border">
            <h3>SİSTEM UYARISI</h3>
            <p id="alert-msg">Mesaj...</p>
            <button style="background:#ef4444; color:white; border:none; padding:10px 24px; border-radius:6px; font-weight:bold; cursor:pointer; margin-top:15px;" onclick="closeCustomAlert()">TAMAM</button>
        </div>
    </div>

    <div id="custom-leaderboard-modal" class="custom-modal">
        <div class="modal-box leader-border">
            <span class="modal-close-x" onclick="closeLeaderboardModal()">×</span>
            <h3>🏆 BAŞARI SIRALAMASI</h3>
            <div class="modal-leaderboard-wrapper" id="popup-leaderboard-box">
                <div style="color:#4b5563; text-align:center; font-size:12px; padding:15px 0;">Aktif oyuncu verisi bulunmuyor.</div>
            </div>
        </div>
    </div>

    <div id="launch-menu-overlay">
        <div class="login-box">
            <h2>BATTLEZONE LIVE</h2>
            
            <div class="menu-btn-group" id="main-menu-buttons">
                <button class="menu-btn primary" onclick="showConnectionForm()">YENİ OYUN (YAYINA BAĞLAN)</button>
                <button class="menu-btn" onclick="openLeaderboardModal()">🏆 BAŞARI SIRALAMASI</button>
            </div>

            <div id="connection-form">
                <div class="input-group">
                    <label>TikTok Canlı Yayın Kullanıcı Adı</label>
                    <input type="text" id="initial-username" placeholder="Örn: yayinci_adi" autocomplete="off">
                </div>

                <div class="slider-wrapper">
                    <label style="color: #9ca3af; font-size: 12px; text-transform: uppercase;">
                        Harita Bölge Sayısı: <span class="slider-val-display" id="slider-val">50</span>
                    </label>
                    <input type="range" min="10" max="100" step="10" value="50" class="custom-slider" id="zone-slider" oninput="updateSliderDisplay(this.value)">
                </div>

                <button class="menu-btn primary" id="connect-trigger-btn" onclick="connectToTikTokLive()">YAYINI DOĞRULA & BAŞLAT ⚔️</button>
                <button class="menu-btn" style="margin-top:10px; font-size:12px; padding:8px;" onclick="hideConnectionForm()">← Geri Dön</button>
            </div>
        </div>
    </div>

    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <span style="font-weight:900;" id="header-logo-text">COOTV</span>
            <span class="live-badge">CANLI</span>
        </div>
        <div class="main-title">TÜM BÖLGELERİ ELE GEÇİR, ZAFERE ULAŞ!</div>
        <button style="background:#ef4444; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-weight:bold;" onclick="location.reload()">Bağlantıyı Kes</button>
    </header>

    <div class="game-container">
        <div class="panel left-side">
            <div class="panel-title">💬 CANLI YAYIN SOHBET AKIŞI</div>
            <div class="chat-box" id="live-chat-box"></div>
        </div>

        <div class="panel center-side">
            <div class="organic-map-container" id="organic-map"></div>
        </div>
    </div>

    <footer>
        <div>Durum: <span id="status-text" style="color:#ef4444; font-weight:bold;">BAĞLANTI YOK</span></div>
        <div>Harita: <span id="footer-zone-count">50</span> Bölge (Gerçek Oyuncu Modu)</div>
    </footer>

    <script>
        let webSocketBridge = null;
        const zonesData = {};
        let maxZones = 50;
        let retryCount = 0;
        const maxRetries = 3;

        window.addEventListener("DOMContentLoaded", () => {
            updateSliderDisplay(50);
            
            setTimeout(() => {
                const splash = document.getElementById("splash-screen");
                const overlay = document.getElementById("launch-menu-overlay");
                splash.style.opacity = "0";
                setTimeout(() => {
                    splash.style.display = "none";
                    overlay.style.visibility = "visible";
                    overlay.style.opacity = "1";
                }, 800);
            }, 2300);
        });

        function updateSliderDisplay(val) {
            document.getElementById("slider-val").innerText = val;
            maxZones = parseInt(val);
        }

        document.getElementById("zone-slider").addEventListener("change", () => {
            initializeEmptyMap();
        });

        function showConnectionForm() {
            document.getElementById("main-menu-buttons").style.display = "none";
            document.getElementById("connection-form").style.display = "block";
        }

        function hideConnectionForm() {
            document.getElementById("connection-form").style.display = "none";
            document.getElementById("main-menu-buttons").style.display = "flex";
        }

        function showCustomAlert(msg) {
            document.getElementById('alert-msg').innerText = msg;
            document.getElementById('custom-alert').style.display = 'flex';
        }
        function closeCustomAlert() {
            document.getElementById('custom-alert').style.display = 'none';
        }

        function openLeaderboardModal() {
            updateRealLeaderboard();
            document.getElementById('custom-leaderboard-modal').style.display = 'flex';
        }
        function closeLeaderboardModal() {
            document.getElementById('custom-leaderboard-modal').style.display = 'none';
        }

        function initializeEmptyMap() {
            const mapContainer = document.getElementById("organic-map");
            mapContainer.innerHTML = "";
            
            let cols = 10;
            if (maxZones <= 20) cols = 5;
            else if (maxZones <= 40) cols = 8;
            mapContainer.style.gridTemplateColumns = `repeat(${cols}, 52px)`;

            for(let i = 1; i <= maxZones; i++) {
                zonesData[i] = { id: i, owner: "", troops: 0 };
                const zone = document.createElement("div");
                zone.className = "map-zone";
                zone.id = `zone-${i}`;
                zone.innerHTML = `<div>${i}</div><div class="zone-user" id="zone-user-${i}"></div>`;
                mapContainer.appendChild(zone);
            }
            document.getElementById("footer-zone-count").innerText = maxZones;
        }

        // AKILLI SORGULAMA VE BAĞLANTI MOTORU
        function connectToTikTokLive() {
            const username = document.getElementById("initial-username").value.trim();
            if(!username) {
                showCustomAlert("Lütfen geçerli bir TikTok kullanıcı adı girin!");
                return;
            }

            const btn = document.getElementById("connect-trigger-btn");
            
            if(retryCount === 0) {
                btn.innerText = "YAYIN SORGULANIYOR...";
            } else {
                btn.innerText = `SAYFA UYANDIRILIYOR (${retryCount}/${maxRetries})...`;
            }
            btn.disabled = true;

            const proxyServerUrl = `wss://tiktok-chat-reader.onrender.com?username=${username}`;
            
            try {
                if(webSocketBridge) {
                    webSocketBridge.close();
                }

                webSocketBridge = new WebSocket(proxyServerUrl);

                webSocketBridge.onopen = () => {
                    retryCount = 0; // Sıfırla
                    initializeEmptyMap();
                    document.getElementById("launch-menu-overlay").style.display = "none";
                    document.getElementById("status-text").innerText = `BAĞLANDI: @${username.toUpperCase()}`;
                    document.getElementById("status-text").style.color = "#10b981";
                    document.getElementById("header-logo-text").innerText = username.toUpperCase();
                };

                webSocketBridge.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    if (data.type === "chat") {
                        handleIncomingChat(data.uniqueId, data.comment);
                    } else if (data.type === "gift") {
                        handleIncomingGift(data.uniqueId, data.giftName);
                    }
                };

                webSocketBridge.onerror = () => {
                    // Eğer ilk denemede hata verirse sunucu uykuda olabilir, tekrar dene
                    if(retryCount < maxRetries) {
                        retryCount++;
                        setTimeout(() => {
                            connectToTikTokLive();
                        }, 2000); // 2 saniye bekleyip tekrar vurur
                    } else {
                        showCustomAlert("Girdiğiniz kullanıcı adı bulunamadı veya yayın henüz yeni açıldığı için sistem senkronize olamadı! Lütfen 1 dakika sonra tekrar deneyin.");
                        resetConnectionUi();
                    }
                };

                webSocketBridge.onclose = () => {
                    if(retryCount === 0) resetConnectionUi();
                };

            } catch(e) {
                showCustomAlert("Bağlantı motorunda geçici bir hata oluştu.");
                resetConnectionUi();
            }
        }

        function resetConnectionUi() {
            retryCount = 0;
            const btn = document.getElementById("connect-trigger-btn");
            if(btn) {
                btn.innerText = "YAYINI DOĞRULA & BAŞLAT ⚔️";
                btn.disabled = false;
            }
            document.getElementById("status-text").innerText = "YAYIN KAPALI / BAĞLANTI YOK";
            document.getElementById("status-text").style.color = "#ef4444";
        }

        function handleIncomingChat(username, comment) {
            const chatBox = document.getElementById("live-chat-box");
            chatBox.innerHTML += `<div class="chat-msg"><span class="chat-user">${username}:</span> ${comment}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            const message = comment.trim().toLowerCase();
            if(message.startsWith("join")) {
                const parts = message.split(" ");
                const zoneId = parseInt(parts[1]);
                if(!isNaN(zoneId) && zoneId >= 1 && zoneId <= maxZones) {
                    const zone = zonesData[zoneId];
                    if(zone) {
                        zone.owner = username;
                        zone.troops += 20;
                        document.getElementById(`zone-${zoneId}`).style.backgroundColor = "#2563eb";
                        document.getElementById(`zone-user-${zoneId}`).innerText = `${username} (${zone.troops})`;
                    }
                }
            }
        }

        function handleIncomingGift(username, giftName) {
            const chatBox = document.getElementById("live-chat-box");
            chatBox.innerHTML += `<div class="chat-msg" style="color:#ef4444;"><span class="chat-user">${username}:</span> 🎁 ${giftName} gönderdi!</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            let addedTroops = 0;
            if(giftName === "Rose" || giftName === "Gül") addedTroops = 50;
            else if(giftName === "TikTok") addedTroops = 100;
            else if(giftName === "Lion" || giftName === "Aslan") addedTroops = 500;

            if(addedTroops > 0) {
                for(let id in zonesData) {
                    if(zonesData[id].owner === username) {
                        zonesData[id].troops += addedTroops;
                        document.getElementById(`zone-user-${id}`).innerText = `${username} (${zonesData[id].troops})`;
                    }
                }
            }
        }

        function updateRealLeaderboard() {
            const scores = {};
            for (let id in zonesData) {
                const owner = zonesData[id].owner;
                if(owner) {
                    scores[owner] = (scores[owner] || 0) + zonesData[id].troops;
                }
            }

            const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
            const popupLbBox = document.getElementById("popup-leaderboard-box");
            popupLbBox.innerHTML = "";

            if(sorted.length === 0) {
                popupLbBox.innerHTML = `<div style="color:#4b5563; text-align:center; font-size:12px; padding:15px 0;">Aktif oyuncu verisi bulunmuyor.</div>`;
                return;
            }

            sorted.forEach(([user, total], index) => {
                popupLbBox.innerHTML += `<div style="display:flex; justify-content:space-between; font-size:13px; padding:6px 0; border-bottom: 1px solid #1e293b;"><div>${index+1}. <b>${user}</b></div><div style="color:#fbbf24;">${total} Asker</div></div>`;
            });
        }
    </script>
</body>
</html>
