<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Bölge Savaşları - Mobil</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            background-color: #121824;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        /* Üst Menü */
        #top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a2232;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        h2 { margin: 0; font-size: 16px; color: #ffbc00; }
        button {
            background: #e53e3e; color: white; border: none;
            padding: 8px 12px; font-weight: bold; border-radius: 5px; cursor: pointer;
        }
        button.green { background: #38a169; }
        
        /* Ana İçerik Alanı */
        #main-layout {
            display: flex;
            flex: 1;
            gap: 10px;
            overflow: hidden;
        }
        
        /* Harita (Sol Taraf) */
        #map-container {
            flex: 2;
            background: #1c2638;
            padding: 10px;
            border-radius: 8px;
            overflow-y: auto;
        }
        #map {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
        }
        .region {
            aspect-ratio: 1;
            background: #4a5568;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            position: relative;
            border: 1px solid #2d3748;
        }
        .region .owner { font-size: 8px; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .region .army { font-size: 8px; color: #00ffcc; }

        /* Sağ Panel (Sıralamalar ve Ayarlar) */
        #right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            background: #1a2232;
            padding: 10px;
            border-radius: 8px;
        }
        .section {
            background: #253147;
            padding: 8px;
            border-radius: 6px;
        }
        h3 { margin: 0 0 8px 0; font-size: 12px; color: #ffbc00; text-align: center; border-bottom: 1px solid #3b4a6b; padding-bottom: 4px; }
        ul { list-style: none; padding: 0; margin: 0; font-size: 11px; }
        li { padding: 4px; background: #1c2638; margin-bottom: 4px; border-radius: 3px; }
        
        /* Ayar Girdileri */
        label { font-size: 10px; display: block; margin-top: 5px; }
        input, select { width: 100%; padding: 5px; background: #121824; border: 1px solid #3b4a6b; color: white; border-radius: 4px; font-size: 11px; }

        /* Alt Alan - Simülatör */
        #simulator-panel {
            background: #0f141c;
            border: 1px dashed #ffbc00;
            padding: 8px;
            border-radius: 8px;
            margin-top: 10px;
        }
        .flex-row { display: flex; gap: 5px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <!-- Üst Başlık ve Yönetim -->
    <div id="top-bar">
        <h2>BÖLGE SAVAŞLARI (100 BÖLGE)</h2>
        <button class="green" onclick="finishGame()">Oyunu Bitir</button>
    </div>

    <!-- Ana Ekran Düzeni -->
    <div id="main-layout">
        
        <!-- Harita Alanı -->
        <div id="map-container">
            <div id="map"></div>
        </div>

        <!-- Sağ Taraf Kontrol ve Skor Tabloları -->
        <div id="right-panel">
            
            <!-- Canlı Liderlik Tablosu -->
            <div class="section">
                <h3>🏆 ANLIK ASKER DURUMU</h3>
                <ul id="leaderboard"></ul>
            </div>

            <!-- İttifaklar -->
            <div class="section">
                <h3>🤝 AKTİF İTTİFAKLAR</h3>
                <ul id="alliances-list"></ul>
            </div>

            <!-- Hediye Asker Ayarları (Yayıncı Değiştirebilir) -->
            <div class="section">
                <h3>⚙️ HEDİYE ASKER AYARLARI</h3>
                <label>Gül Askeri:</label>
                <input type="number" id="cfg-gul" value="50" onchange="saveConfig()">
                <label>TikTok Askeri:</label>
                <input type="number" id="cfg-tiktok" value="100" onchange="saveConfig()">
                <label>Aslan Askeri:</label>
                <input type="number" id="cfg-aslan" value="500" onchange="saveConfig()">
            </div>

            <!-- Ana Menü / Cihazda Saklanan Winler -->
            <div class="section">
                <h3>👑 GEÇMİŞ KAZANANLAR (WİNLER)</h3>
                <ul id="win-history"></ul>
            </div>

        </div>
    </div>

    <!-- Alt Kısım: Yayıncının Test Etmesi İçin Dahili Chat Simülatörü -->
    <div id="simulator-panel">
        <div class="flex-row">
            <input type="text" id="simUser" placeholder="Oyuncu Adı (Örn: Yusuf)" style="flex: 1;">
            <input type="text" id="simMsg" placeholder="Komut (join 11, attack 12, all attack, 99)" style="flex: 2;">
            <button class="green" onclick="simulateChat()" style="padding: 5px 10px;">Gönder</button>
        </div>
        <div class="flex-row">
            <select id="simGift" style="flex: 2;">
                <option value="Gül">🌹 Gül</option>
                <option value="TikTok">🎵 TikTok</option>
                <option value="Aslan">🦁 Aslan</option>
            </select>
            <button onclick="simulateGift()" style="flex: 1; background: #d69e2e; padding: 5px 10px;">Hediye Yolla</button>
        </div>
    </div>

    <script>
        // Değişken Tanımlamaları
        let regions = {};
        let players = {};
        let alliances = [];
        let winHistory = JSON.parse(localStorage.getItem('local_win_history')) || [];
        let giftConfig = { "Gül": 50, "TikTok": 100, "Aslan": 500 };
        const colors = ['#e53e3e', '#3182ce', '#38a169', '#d69e2e', '#805ad5', '#e066ff', '#00bfff', '#ff1493', '#ff8c00', '#48bb78'];

        // 1. Haritayı Oluştur (1-100 Bölge)
        function initMap() {
            const mapDiv = document.getElementById('map');
            mapDiv.innerHTML = '';
            for (let i = 1; i <= 100; i++) {
                regions[i] = { id: i, owner: null, army: 0 };
                
                let div = document.createElement('div');
                div.className = 'region';
                div.id = `reg-${i}`;
                div.onclick = () => alert(`Bölge: ${i}\nSahibi: ${regions[i].owner || 'Yok'}\nAsker: ${regions[i].army}`);
                div.innerHTML = `<span>${i}</span><span class="owner"></span><span class="army"></span>`;
                mapDiv.appendChild(div);
            }
            updateWinHistoryUI();
        }

        // Arayüzü Hücre Hücre Güncelle
        function updateMapUI() {
            for (let i = 1; i <= 100; i++) {
                let reg = regions[i];
                let div = document.getElementById(`reg-${i}`);
                let ownerSpan = div.querySelector('.owner');
                let armySpan = div.querySelector('.army');

                if (reg.owner) {
                    div.style.backgroundColor = players[reg.owner].color;
                    ownerSpan.innerText = reg.owner;
                    armySpan.innerText = reg.army;
                } else {
                    div.style.backgroundColor = '#4a5568';
                    ownerSpan.innerText = '';
                    armySpan.innerText = '';
                }
            }
            updateLeaderboard();
        }

        function saveConfig() {
            giftConfig["Gül"] = parseInt(document.getElementById('cfg-gul').value) || 50;
            giftConfig["TikTok"] = parseInt(document.getElementById('cfg-tiktok').value) || 100;
            giftConfig["Aslan"] = parseInt(document.getElementById('cfg-aslan').value) || 500;
        }

        // 2. Ana Canlı Sohbet Komut Algoritması
        function processCommand(user, message) {
            user = user.trim();
            message = message.trim().toLowerCase();

            // JOIN KOMUTU (Örn: join 11)
            if (message.startsWith('join ')) {
                let num = parseInt(message.replace('join ', ''));
                if (num >= 1 && num <= 100 && !regions[num].owner) {
                    if (!players[user]) {
                        players[user] = { color: colors[Object.keys(players).length % colors.length], score: 100 };
                    }
                    regions[num].owner = user;
                    regions[num].army = 20; // Giriş askeri
                    updateMapUI();
                }
            }
            
            // 99 VEYA BEĞENİ İLE ASKER KASMA
            else if (message === '99' || message === 'beğeni' || message === 'begeni') {
                let hasRegion = false;
                for (let i = 1; i <= 100; i++) {
                    if (regions[i].owner === user) {
                        regions[i].army += (message === '99' ? 20 : 5);
                        hasRegion = true;
                    }
                }
                if (hasRegion) updateMapUI();
            }

            // TEK BÖLGEYE SALDIRI (Örn: attack 12)
            else if (message.startsWith('attack ') && message !== 'all attack') {
                let target = parseInt(message.replace('attack ', ''));
                if (target >= 1 && target <= 100) {
                    executeAttack(user, target);
                }
            }

            // ALL ATTACK KOMUTU (Tüm düşmanlara aynı anda savaş açma)
            else if (message === 'all attack') {
                for (let i = 1; i <= 100; i++) {
                    if (regions[i].owner && regions[i].owner !== user) {
                        executeAttack(user, i);
                    }
                }
            }

            // İTTİFAK SİSTEMİ (Örn: ittifak Ahmet)
            else if (message.startsWith('ittifak ')) {
                let targetUser = message.replace('ittifak ', '').trim();
                let targetExists = Object.values(regions).some(r => r.owner && r.owner.toLowerCase() === targetUser.toLowerCase());
                
                if (targetExists) {
                    let realTargetName = Object.keys(players).find(k => k.toLowerCase() === targetUser.toLowerCase());
                    let alreadyAlly = alliances.some(pair => pair.includes(user) && pair.includes(realTargetName));
                    if (!alreadyAlly && user !== realTargetName) {
                        alliances.push([user, realTargetName]);
                        updateAlliancesUI();
                    }
                }
            }
        }

        // Savaş Mekanizması Hesaplaması
        function executeAttack(attacker, targetId) {
            let targetReg = regions[targetId];
            if (!targetReg.owner || targetReg.owner === attacker) return;

            // İttifak kontrolü (Eğer ortaklarsa pas geç)
            if (alliances.some(pair => pair.includes(attacker) && pair.includes(targetReg.owner))) return;

            // Saldıranın gücünü topla (Bölgelerindeki askerlerin yarısını savaşa sürer)
            let totalAttackPower = 0;
            for (let i = 1; i <= 100; i++) {
                if (regions[i].owner === attacker && regions[i].army > 5) {
                    let send = Math.floor(regions[i].army / 2);
                    regions[i].army -= send;
                    totalAttackPower += send;
                }
            }

            if (totalAttackPower === 0) return;

            // Kim kazandı hesaplaması
            if (totalAttackPower > targetReg.army) {
                targetReg.owner = attacker;
                targetReg.army = totalAttackPower - targetReg.army;
                players[attacker].score += 100;
            } else {
                targetReg.army -= totalAttackPower;
            }
            updateMapUI();
        }

        // Hediye Atıldığında Tetiklenen Bölüm
        function processGift(user, giftName) {
            let bonus = giftConfig[giftName] || 10;
            let hasRegion = false;
            for (let i = 1; i <= 100; i++) {
                if (regions[i].owner === user) {
                    regions[i].army += bonus;
                    hasRegion = true;
                }
            }
            if (hasRegion) {
                players[user].score += bonus;
                updateMapUI();
            }
        }

        function updateLeaderboard() {
            let scores = {};
            for (let i = 1; i <= 100; i++) {
                if (regions[i].owner) {
                    scores[regions[i].owner] = (scores[regions[i].owner] || 0) + regions[i].army;
                }
            }
            let sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
            let lb = document.getElementById('leaderboard');
            lb.innerHTML = '';
            sorted.forEach(([p, army]) => {
                lb.innerHTML += `<li><span style="color:${players[p].color}">■</span> ${p}: <b>${army} Asker</b> (Skor: ${players[p].score})</li>`;
            });
        }

        function updateAlliancesUI() {
            let list = document.getElementById('alliances-list');
            list.innerHTML = '';
            alliances.forEach(pair => { list.innerHTML += `<li>🤝 ${pair[0]} & ${pair[1]}</li>`; });
        }

        // 3. Oyun Bitimi ve Cihaza Kalıcı Kayıt Mekanizması (İstediğin Sıralama Sistemi)
        function finishGame() {
            let topPlayer = null;
            let maxScore = -1;

            Object.keys(players).forEach(p => {
                if (players[p].score > maxScore) {
                    maxScore = players[p].score;
                    topPlayer = p;
                }
            });

            if (topPlayer) {
                // Yeni kaydı listeye ekle
                winHistory.push({ name: topPlayer, score: maxScore });
                
                // PUANA GÖRE BÜYÜKTEN KÜÇÜĞE SIRALAMA (Örn: Yusuf 1000, Ahmet 500)
                winHistory.sort((a, b) => b.score - a.score);
                
                // Telefon hafızasına kalıcı olarak yazdır (Sıfır Sunucu Maliyeti)
                localStorage.setItem('local_win_history', JSON.stringify(winHistory));
                
                updateWinHistoryUI();
                alert(`Oyun Bitti!\nKazanan: ${topPlayer} (${maxScore} Puan)`);
            } else {
                alert("Henüz aktif oyuncu yok.");
            }

            // Yeniden başlatmak için temizle
            players = {}; alliances = []; initMap(); updateMapUI();
        }

        // Hafızadaki Win Geçmişini Ekrana Basma
        function updateWinHistoryUI() {
            let winUl = document.getElementById('win-history');
            winUl.innerHTML = '';
            winHistory.forEach((win, index) => {
                // Tam istediğin şablon: 1. Yusuf 1000 puan
                winUl.innerHTML += `<li><b>${index + 1}. ${win.name}</b> ${win.score} puan</li>`;
            });
        }

        /* --- TEST SİMÜLASYON TETİKLEYİCİLERİ --- */
        function simulateChat() {
            let user = document.getElementById('simUser').value || "Yusuf";
            let msg = document.getElementById('simMsg').value;
            if (!msg) return;
            processCommand(user, msg);
            document.getElementById('simMsg').value = '';
        }
        function simulateGift() {
            let user = document.getElementById('simUser').value || "Yusuf";
            let gift = document.getElementById('simGift').value;
            if (!players[user]) { alert("Önce 'join <no>' yazarak haritaya girmelisiniz."); return; }
            processGift(user, gift);
        }

        initMap();
    </script>
</body>
</html>
