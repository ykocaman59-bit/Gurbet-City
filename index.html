<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TikTok Bölge Savaşları - Gelişmiş Canlı Ekran</title>
    <style>
        /* TİKTOK CANLI YAYIN TAM EKRAN OYUN TEMASI */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial Black', sans-serif; user-select: none; }
        
        body {
            background: #060913; color: #fff; min-height: 100vh;
            display: flex; flex-direction: column; padding: 10px; overflow-x: hidden;
        }

        /* Üst Başlık Alnı */
        #header { text-align: center; margin-bottom: 10px; position: relative; padding: 5px; }
        #header h1 { font-size: 22px; color: #fff; text-shadow: 0 0 10px #ffbc00, 0 0 20px #ffbc00; letter-spacing: 1px; }
        #header span { color: #ffbc00; }
        .btn-reset {
            position: absolute; right: 5px; top: 5px; background: #22c55e; border: none;
            color: white; padding: 6px 15px; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 11px;
        }

        /* DEV HARİTA ALANI (Göt kadar kalmasın diye tam esnek yapıldı) */
        #map-container {
            width: 100%; background: radial-gradient(circle, #0f172a 0%, #070a12 100%);
            border: 3px solid #1e293b; border-radius: 12px; position: relative;
            margin-bottom: 15px; box-shadow: 0 0 25px rgba(0,0,0,0.7);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; }

        /* ALT PANEL DÜZENİ: Bilgiler ve Yan Veriler */
        #bottom-layout {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px;
        }
        
        .box {
            background: rgba(16, 22, 37, 0.9); border: 1px solid #1f2937;
            border-radius: 8px; padding: 10px;
        }
        .box h3 { font-size: 13px; color: #ffbc00; border-bottom: 2px solid #1f2937; padding-bottom: 4px; margin-bottom: 8px; text-transform: uppercase; }
        
        /* Liste Tasarımları */
        .list-item { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 6px; background: #151f32; margin-bottom: 4px; border-radius: 4px; }
        #chat-flow { max-height: 120px; overflow-y: auto; font-size: 12px; }
        .chat-msg { margin-bottom: 3px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 2px; }
        .chat-msg .username { color: #38bdf8; font-weight: bold; }
        .chat-msg .cmd { color: #f43f5e; font-weight: bold; }

        /* Kurallar Şeridi */
        #rules-bar {
            grid-column: 1 / -1; background: #111827; border: 1px solid #ffbc00;
            border-radius: 8px; padding: 10px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; text-align: center;
        }
        .rule-card h4 { color: #ffbc00; font-size: 11px; margin-bottom: 2px; }
        .rule-card p { color: #9ca3af; font-size: 10px; }

        /* Manuel Test Konsolu */
        #console-panel {
            grid-column: 1 / -1; background: #111827; padding: 10px; border-radius: 8px;
            display: flex; gap: 10px; border: 1px dashed #4b5563; margin-top: 5px;
        }
        #console-panel input { background: #1f2937; color: white; border: 1px solid #374151; padding: 8px; border-radius: 6px; font-size: 13px; }
        #console-panel button { background: #2563eb; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        @media (max-width: 600px) {
            #rules-bar { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <div id="header">
        <h1>TÜM BÖLGELERİ ELE GEÇİR, <span>ZAFERE ULAŞ!</span></h1>
        <button class="btn-reset" onclick="finishGame()">Oyunu Bitir</button>
    </div>

    <div id="map-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="bottom-layout">
        
        <div class="box">
            <h3>🏆 Liderlik Tablosu</h3>
            <div id="leaderboard"></div>
        </div>

        <div class="box">
            <h3>💬 Canlı Sohbet Akışı</h3>
            <div id="chat-flow"></div>
        </div>

        <div class="box">
            <h3>👑 Geçmiş Winler / İttifaklar</h3>
            <div id="win-history"></div>
            <div id="alliances-list" style="font-size: 11px; color: #9ca3af; margin-top: 5px; border-top: 1px dashed #334155; padding-top: 5px;"></div>
        </div>

        <div id="rules-bar">
            <div class="rule-card"><h4>BÖLGE ALMAK</h4><p>join <span style="color:#ffbc00;">[no]</span> (Boşsa alır)</p></div>
            <div class="rule-card"><h4>SALDIRI YAPMAK</h4><p>attack <span style="color:#f43f5e;">[no]</span> / all attack</p></div>
            <div class="rule-card"><h4>ASKER KASMAK</h4><p>Yoruma <span style="color:#00ffcc;">99</span> yazın (+20)</p></div>
            <div class="rule-card"><h4>İTTİFAK KURMAK</h4><p>ittifak <span style="color:#38bdf8;">[no]</span> yazın</p></div>
        </div>

        <div id="console-panel">
            <input type="text" id="tUser" placeholder="Oyuncu İsmi" style="flex: 1;">
            <input type="text" id="tMsg" placeholder="Komut yaz (Örn: join 25 veya 99 veya attack 50)" style="flex: 2;">
            <button onclick="triggerAction()">Kodu Çalıştır</button>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let regions = {};
        let players = {};
        let alliances = [];
        let winHistory = JSON.parse(localStorage.getItem('tiktok_ultra_wins')) || [];
        const colors = ['#22c55e', '#3b82f6', '#a855f7', '#ef4444', '#eab308', '#ec4899', '#06b6d4', '#f97316'];

        // Savaş haritası altıgen (hex) oranları
        const hexRadius = 26; 
        const hexHeight = hexRadius * Math.sqrt(3);
        const cols = 10;
        const rows = 10;

        // 100 Bölge Yapılandırması
        function initGame() {
            let id = 1;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (id <= 100) {
                        let x = c * hexRadius * 1.5 + hexRadius;
                        let y = r * hexHeight + (c % 2 * hexHeight / 2) + hexHeight / 2;
                        regions[id] = { id: id, x: x, y: y, owner: null, army: 0, battleFlash: false };
                        id++;
                    }
                }
            }
            adjustCanvasDimensions();
            updateWinHistoryUI();
        }

        // Haritanın Ekranda Dev Gibi Durmasını Sağlayan Dinamik Boyut Motoru
        function adjustCanvasDimensions() {
            const container = document.getElementById('map-container');
            
            // Sabit petek matrisinin toplam orijinal sınırları
            const totalWidth = cols * hexRadius * 1.5 + hexRadius;
            const totalHeight = rows * hexHeight + (hexHeight / 2);
            
            // Ekran genişliğine göre dinamik ölçek hesabı
            const screenWidth = container.clientWidth;
            const scaleFactor = screenWidth / totalWidth;
            
            // Canvas boyutlarını ve yüksekliğini haritaya tam oturacak şekilde hesapla
            canvas.width = screenWidth;
            canvas.height = totalHeight * scaleFactor;
            container.style.height = canvas.height + "px"; // Kutu daralmasın, devleşsin!

            renderCanvas(scaleFactor);
        }
        window.addEventListener('resize', adjustCanvasDimensions);

        // Grafiksel Haritayı Çizme Fonksiyonu
        function renderCanvas(scale) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.scale(scale, scale);

            for (let i = 1; i <= 100; i++) {
                let reg = regions[i];
                
                // Altıgen Çizimi
                ctx.beginPath();
                for (let j = 0; j < 6; j++) {
                    let angle = j * Math.PI / 3;
                    ctx.lineTo(reg.x + hexRadius * Math.cos(angle), reg.y + hexRadius * Math.sin(angle));
                }
                ctx.closePath();

                // Durum Renklendirmesi
                if (reg.battleFlash) {
                    ctx.fillStyle = '#ffffff'; // Saldırı patlama efekti
                } else if (reg.owner) {
                    ctx.fillStyle = players[reg.owner].color;
                } else {
                    ctx.fillStyle = '#1c2536'; // Boş orijinal bölge rengi
                }
                ctx.fill();

                // Çizgiler
                ctx.strokeStyle = reg.owner ? '#ffffff' : '#2d3748';
                ctx.lineWidth = reg.owner ? 2 : 1;
                ctx.stroke();

                // Yazılar (Bölge No)
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.font = 'bold 11px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(reg.id, reg.x, reg.y - 7);

                // Oyuncu Adı ve Asker Sayısı
                if (reg.owner) {
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '900 10px Arial';
                    ctx.fillText(reg.owner.substring(0, 7), reg.x, reg.y + 4);
                    
                    ctx.fillStyle = '#00ffcc';
                    ctx.font = 'bold 9px Arial';
                    ctx.fillText(`⚔️${reg.army}`, reg.x, reg.y + 14);
                }
            }
            ctx.restore();
        }

        // TİKTOK KOMUT DOĞRULAMA ALGORİTMASI
        function parseInput(user, text) {
            user = user.trim();
            text = text.trim().toLowerCase();
            if (!user || !text) return;

            pushChat(user, text);

            // 1. JOIN (İstediğin Mantık: Boşsa alır, doluysa hiçbir şey yapmaz)
            if (text.startsWith('join ')) {
                let num = parseInt(text.replace('join ', ''));
                if (num >= 1 && num <= 100) {
                    if (!regions[num].owner) { // Boşluk kontrolü tam burada
                        if (!players[user]) {
                            players[user] = { color: colors[Object.keys(players).length % colors.length], score: 100 };
                        }
                        regions[num].owner = user;
                        regions[num].army = 35; // İlk giriş askeri
                        triggerRefresh();
                    }
                }
            }
            
            // 2. 99 KOMUTU (Yoruma 99 yazanın haritadaki tüm bölgelerine +20 asker biner)
            else if (text === '99') {
                let apply = false;
                for (let i = 1; i <= 100; i++) {
                    if (regions[i].owner === user) {
                        regions[i].army += 20;
                        apply = true;
                    }
                }
                if (apply) triggerRefresh();
            }

            // 3. ATTACK (Bölgeye Saldırı)
            else if (text.startsWith('attack ') && text !== 'all attack') {
                let targetId = parseInt(text.replace('attack ', ''));
                if (targetId >= 1 && targetId <= 100) startWar(user, targetId);
            }

            // 4. ALL ATTACK (Tüm haritadaki düşmanlara topyekün savaş)
            else if (text === 'all attack') {
                for (let i = 1; i <= 100; i++) {
                    if (regions[i].owner && regions[i].owner !== user) {
                        startWar(user, i);
                    }
                }
            }

            // 5. İTTİFAK SİSTEMİ (O bölgedeki biriyle ittifak bağı kurar)
            else if (text.startsWith('ittifak ')) {
                let id = parseInt(text.replace('ittifak ', ''));
                if (id >= 1 && id <= 100) {
                    let allyTarget = regions[id].owner;
                    if (allyTarget && allyTarget !== user) {
                        let alreadyAllies = alliances.some(p => p.includes(user) && p.includes(allyTarget));
                        if (!alreadyAllies) {
                            alliances.push([user, allyTarget]);
                            renderAlliances();
                        }
                    }
                }
            }
        }

        // Savaş Dinamiği Mekanizması
        function startWar(attacker, targetId) {
            let target = regions[targetId];
            if (!target.owner || target.owner === attacker) return;

            // İttifak koruması devrede mi?
            if (alliances.some(p => p.includes(attacker) && p.includes(target.owner))) return;

            let totalPower = 0;
            for (let i = 1; i <= 100; i++) {
                if (regions[i].owner === attacker && regions[i].army > 10) {
                    let attackForce = Math.floor(regions[i].army / 2);
                    regions[i].army -= attackForce;
                    totalPower += attackForce;
                }
            }

            if (totalPower > 0) {
                target.battleFlash = true;
                triggerRefresh();

                setTimeout(() => {
                    target.battleFlash = false;
                    if (totalPower > target.army) {
                        target.owner = attacker;
                        target.army = totalPower - target.army;
                        players[attacker].score += 250; // Skoru tetikle
                    } else {
                        target.army -= totalPower;
                    }
                    triggerRefresh();
                }, 250);
            }
        }

        function triggerRefresh() {
            adjustCanvasDimensions();
            refreshLeaderboard();
        }

        // Alt Liste Güncellemeleri
        function refreshLeaderboard() {
            let lb = document.getElementById('leaderboard'); lb.innerHTML = '';
            let data = {};
            for (let i = 1; i <= 100; i++) {
                if (regions[i].owner) data[regions[i].owner] = (data[regions[i].owner] || 0) + regions[i].army;
            }
            Object.entries(data).sort((a,b) => b[1] - a[1]).slice(0, 5).forEach(([name, army]) => {
                lb.innerHTML += `<div class="list-item"><span><b style="color:${players[name].color}">■</b> ${name}</span><span>${army} Asker</span></div>`;
            });
        }

        function renderAlliances() {
            let div = document.getElementById('alliances-list'); div.innerHTML = '';
            alliances.forEach(p => { div.innerHTML += `<span>🤝 ${p[0]}-${p[1]} </span>`; });
        }

        function pushChat(user, msg) {
            const flow = document.getElementById('chat-flow');
            let m = document.createElement('div'); m.className = 'chat-msg';
            m.innerHTML = `<span class="username">${user}</span>: <span class="cmd">${msg}</span>`;
            flow.appendChild(m);
            if (flow.childNodes.length > 5) flow.removeChild(flow.firstChild);
            flow.scrollTop = flow.scrollHeight;
        }

        // Oyunu Bitirme ve Winleri Kaydetme Sistemi
        function finishGame() {
            let topUser = null; let maxScore = -1;
            Object.keys(players).forEach(p => {
                if (players[p].score > maxScore) { maxScore = players[p].score; topUser = p; }
            });

            if (topUser) {
                winHistory.push({ name: topUser, score: maxScore });
                winHistory.sort((a,b) => b.score - a.score); // Büyükten küçüğe kusursuz sıralama
                localStorage.setItem('tiktok_ultra_wins', JSON.stringify(winHistory));
                updateWinHistoryUI();
                alert(`Tur Bitti! Kazanan: ${topUser}`);
            }
            players = {}; alliances = []; initGame();
        }

        function updateWinHistoryUI() {
            let div = document.getElementById('win-history'); div.innerHTML = '';
            winHistory.slice(0, 5).forEach((w, idx) => {
                div.innerHTML += `<div class="list-item"><span>${idx+1}. ${w.name}</span> <span style="color:#eab308;">${w.score} Puan</span></div>`;
            });
        }

        // Yayıncı Manuel Gönderme Buton Akışı
        function triggerAction() {
            let user = document.getElementById('tUser').value || "Yusuf";
            let msg = document.getElementById('tMsg').value;
            if (!msg) return;
            parseInput(user, msg);
            document.getElementById('tMsg').value = '';
        }

        initGame();
    </script>
</body>
</html>
