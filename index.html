<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>BATTLEZONE LIVE - Türkiye Edition</title>
    <style>
        body { background: #0b0f17; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        /* BEYAZ GİRİŞ EKRANI */
        #splash-screen {
            position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index:9999;
            display:flex; align-items:center; justify-content:center;
        }
        .splash-text { color: #ffffff; font-size: 40px; font-weight: bold; letter-spacing: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* HARİTA ALANI - 1000193060_9.png İLE UYUMLU */
        .map-container {
            width: 95%; max-width: 600px; position: relative;
            background-image: url('1000193060_9.png');
            background-size: contain; background-repeat: no-repeat;
            aspect-ratio: 2 / 1; margin: 20px 0; border: 2px solid #2563eb; border-radius: 10px;
        }

        /* RASTGELE RENKLİ BÖLGELER */
        .zone {
            position: absolute; width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold; cursor: pointer; transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.3); opacity: 0.7;
        }
    </style>
</head>
<body>

    <div id="splash-screen"><div class="splash-text">BATTLEZONE LIVE</div></div>

    <div class="map-container" id="map"></div>

    <script>
        const colors = ['#ef4444', '#22c55e', '#3b82f6', '#f59e0b', '#a855f7', '#ec4899'];
        const map = document.getElementById('map');

        // Rastgele bölge yerleşimi
        for(let i=1; i<=100; i++) {
            let z = document.createElement('div');
            z.className = 'zone';
            z.innerText = i;
            // Harita üzerindeki koordinatları simüle ediyoruz
            z.style.left = (Math.random() * 80 + 10) + '%';
            z.style.top = (Math.random() * 70 + 15) + '%';
            z.onclick = () => {
                z.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                z.style.opacity = '1';
            };
            map.appendChild(z);
        }

        setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 2000);
    </script>
</body>
</html>
