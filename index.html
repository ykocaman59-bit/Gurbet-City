<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Warzone Live Map</title>
    <style>
        * {
            box-sizing: border-box; margin: 0; padding: 0;
            -webkit-user-select: none; user-select: none;
            font-family: 'Courier New', Courier, monospace; /* Askeri tema için */
        }
        body { 
            background-color: #070a0f; color: #00ffcc; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; padding: 10px; overflow: hidden;
        }
        
        .warzone-container { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 10px; }

        header { 
            background: #0f141c; border: 1px solid #00ffcc; border-radius: 8px; 
            padding: 10px; text-align: center; box-shadow: 0 0 10px rgba(0,255,204,0.2);
        }

        /* TAM SENİN İSTEDİĞİN SÜREKLİ BÜTÜN DURAN WARZONE HARİTA PANELİ */
        .warzone-map-frame {
            width: 100%;
            aspect-ratio: 16 / 10;
            border: 2px solid #00ffcc;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            /* Fotoğraftaki askeri strateji odası ambiyansını veren arka plan rengi */
            background-color: #121a24;
            box-shadow: 0 0 20px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,255,204,0.3);
        }

        /* Haritayı bütün halinde tutan, parçalamayan orijinal vektörel ana kıta tasarımı */
        .tactical-canvas {
            width: 100%; height: 100%; display: block;
        }
        .land-mass {
            fill: #1a2634; /* Askeri koyu gri/mavi ton */
            stroke: #2a3c54; /* Sektör çizgileri */
            stroke-width: 1;
        }

        /* SAYILARIN VE RENKLERİN HARİTAYI BOZMADAN GÖMÜLDÜĞÜ KATMAN */
        .overlay-grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .zone-node { 
            position: absolute; transform: translate(-50%, -50%); 
            display: flex; align-items: center; justify-content: center; z-index: 10;
        }

        /* Fotoğraftaki gibi sadece renkli daire ve içindeki sayı */
        .zone-badge {
            width: 22px; height: 22px; 
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            box-shadow: 0 0 8px rgba(0,0,0,0.9);
            border: 1px solid #ffffff;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .zone-badge span { font-size: 10px; font-weight: 900; color: #ffffff; text-shadow: 1px 1px 1px #000; }

        /* Savaş/Saldırı Anındaki Efekt */
        @keyframes radarPing {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.3); filter: brightness(1.8); box-shadow: 0 0 15px #ff0055; }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .under-attack { animation: radarPing 0.4s ease-in-out; z-index: 99; }

        /* ALT LOG PANELİ */
        .log-panel { 
            height: 100px; background: #0f141c; border: 1px solid #334155; 
            border-radius: 8px; padding: 8px; display: flex; flex-direction: column;
        }
        .log-box { flex: 1; overflow-y: auto; font-size: 11px; color: #88a0c0; }
    </style>
</head>
<body>

    <div class="warzone-container">
        <header>
            <span style="font-weight:900; letter-spacing: 2px;">WARZONE TACTICAL SYSTEM</span>
        </header>

        <div class="warzone-map-frame">
            <svg class="tactical-canvas" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
                <path class="land-mass" d="M100,200 Q200,100 400,150 T700,120 Q780,250 720,380 Q550,450 400,400 T150,420 Z" />
                <path d="M250,170 Q300,280 350,410 M500,150 Q450,300 420,400 M150,280 Q400,250 680,310" fill="none" stroke="#233348" stroke-width="1.5" />
            </svg>
            
            <div class="overlay-grid" id="numbers-layer"></div>
        </div>

        <div class="log-panel">
            <div style="color: #ff0055; font-size: 11px; font-weight: bold; margin-bottom: 4px;">📡 RADAR LOGS</div>
            <div class="log-box" id="radar-logs">Warzone haritası yüklendi. 100 sektör aktif.</div>
        </div>
    </div>

    <script>
        const askeriRenkler = ['#ff0055', '#00ffcc', '#ffcc00', '#ff00ff', '#00ffff', '#33ff00', '#ff6600', '#9900ff', '#00ff66', '#3399ff'];
        
        // Harita üzerine milimetrik nizamda dağıtılan 100 adet hazır koordinat şablonu
        const warzoneGrid = [
            {x:18, y:42}, {x:22, y:36}, {x:26, y:45}, {x:30, y:38}, {x:24, y:52}, {x:34, y:50}, {x:38, y:44}, {x:32, y:32}, {x:42, y:36}, {x:36, y:60},
            {x:44, y:54}, {x:48, y:48}, {x:46, y:38}, {x:52, y:32}, {x:50, y:62}, {x:56, y:56}, {x:60, y:50}, {x:58, y:40}, {x:62, y:34}, {x:58, y:70},
            {x:64, y:64}, {x:68, y:58}, {x:66, y:46}, {x:72, y:40}, {x:70, y:30}, {x:68, y:75}, {x:74, y:70}, {x:78, y:64}, {x:76, y:52}, {x:82, y:46},
            {x:80, y:36}, {x:78, y:80}, {x:84, y:74}, {x:88, y:68}, {x:86, y:56}, {x:92, y:50}, {x:90, y:40}, {x:88, y:28}, {x:12, y:48}, {x:16, y:54},
            {x:20, y:28}, {x:30, y:24}, {x:40, y:26}, {x:50, y:28}, {x:60, y:24}, {x:70, y:26}, {x:80, y:22}, {x:88, y:24}, {x:14, y:34}, {x:24, y:24},
            {x:16, y:60}, {x:24, y:64}, {x:34, y:68}, {x:44, y:70}, {x:54, y:72}, {x:64, y:74}, {x:74, y:76}, {x:84, y:78}, {x:90, y:60}, {x:82, y:58},
            {x:12, y:40}, {x:48, y:20}, {x:58, y:18}, {x:68, y:20}, {x:78, y:18}, {x:38, y:16}, {x:28, y:16}, {x:54, y:26}, {x:64, y:26}, {x:74, y:26},
            {x:12, y:54}, {x:22, y:56}, {x:32, y:56}, {x:42, y:56}, {x:52, y:56}, {x:62, y:56}, {x:72, y:56}, {x:82, y:56}, {x:92, y:56}, {x:48, y:60},
            {x:15, y:68}, {x:25, y:68}, {x:35, y:68}, {x:45, y:68}, {x:55, y:68}, {x:65, y:68}, {x:75, y:68}, {x:85, y:68}, {x:95, y:68}, {x:50, y:72},
            {x:18, y:78}, {x:28, y:78}, {x:38, y:78}, {x:48, y:78}, {x:58, y:78}, {x:68, y:78}, {x:78, y:78}, {x:88, y:78}, {x:92, y:72}, {x:50, y:82}
        ];

        document.addEventListener("DOMContentLoaded", () => {
            const anaKatman = document.getElementById("numbers-layer");
            
            // 1'den 100'e kadar olan sayıları oluştur ve karıştır
            let sayiListesi = Array.from({length: 100}, (_, i) => i + 1);
            sayiListesi.sort(() => Math.random() - 0.5);

            // Sayıları ve renkli daireleri haritaya yerleştirme
            warzoneGrid.forEach((koordinat, index) => {
                let sektorNo = sayiListesi[index];
                let sektorRengi = askeriRenkler[Math.floor(Math.random() * askeriRenkler.length)];

                const dugum = document.createElement("div");
                dugum.className = "zone-node";
                dugum.style.left = `${koordinat.x}%`;
                dugum.style.top = `${koordinat.y}%`;
                dugum.id = `node-${sektorNo}`;

                dugum.innerHTML = `
                    <div class="zone-badge" id="badge-${sektorNo}" style="background: ${sektorRengi}">
                        <span>${sektorNo}</span>
                    </div>
                `;

                // Tıklandığında renk değiştirme ve patlama efekti testi
                dugum.addEventListener("click", () => sektorEleGecir(sektorNo));
                anaKatman.appendChild(dugum);
            });
        });

        function sektorEleGecir(no) {
            const eleman = document.getElementById(`node-${no}`);
            const icDaire = document.getElementById(`badge-${no}`);
            if(!eleman) return;

            // Fotoğraftaki gibi parlayıp sönme animasyonu tetikle
            eleman.classList.add("under-attack");
            setTimeout(() => eleman.classList.remove("under-attack"), 400);

            // Rengini rastgele yeni bir askeri renge çevir
            let yeniRenk = askeriRenkler[Math.floor(Math.random() * askeriRenkler.length)];
            icDaire.style.background = yeniRenk;

            // Log paneline yaz
            const logKutusu = document.getElementById("radar-logs");
            logKutusu.innerHTML += `<br>[ALERT]: Sektör ${no} ele geçirildi!`;
            logKutusu.scrollTop = logKutusu.scrollHeight;
        }
    </script>
</body>
</html>
