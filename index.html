<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Canlı Yayın Savaş Motoru - Hediye ve Beğeni Entegreli</title>
    <!-- Resmi TikTok Canlı Chat Bağlantı Kütüphanesi -->
    <script src="https://cdn.jsdelivr.net/npm/@node-it/tiktok-live-connector-browser@1.0.0/dist/tiktok-live-connector.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial Black', sans-serif; user-select: none; }
        body { background: #050811; color: #fff; min-height: 100vh; display: flex; flex-direction: column; padding: 10px; overflow-x: hidden; }

        /* YAYINCI ANA KONTROL PANELİ */
        #streamer-panel {
            background: #111827; padding: 12px; border-radius: 12px; border: 2px solid #ff0050;
            margin-bottom: 12px; display: flex; flex-direction: column; gap: 10px;
            box-shadow: 0 0 15px rgba(255, 0, 80, 0.3);
        }
        .panel-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        input { background: #1f2937; color: white; border: 1px solid #374151; padding: 6px 10px; border-radius: 6px; font-size: 12px; }
        
        .btn-connect { background: #ff0050; color: white; border: none; padding: 6px 14px; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .btn-reset { background: #22c55e; border: none; color: white; padding: 6px 14px; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 12px; margin-left: auto; }

        /* HEDİYE ASKER AYARLARI KUTULARI */
        .gift-settings {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px;
            background: #1f2937; padding: 10px; border-radius: 8px; border: 1px solid #374151;
        }
        .gift-input-group { display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: #ffbc00; }
        .gift-input-group input { width: 100%; text-align: center; font-weight: bold; color: #00ffcc; }

        /* DEV HARİTA ALANI */
        #map-container {
            width: 100%; background: radial-gradient(circle, #0f172a 0%, #05070f 100%);
            border: 3px solid #1e293b; border-radius: 12px; position: relative;
            margin-bottom: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; }

        /* GRID PANELLER */
        #bottom-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
        .box { background: rgba(16, 22, 37, 0.95); border: 1px solid #1f2937; border-radius: 8px; padding: 10px; }
        .box h3 { font-size: 13px; color: #ffbc00; border-bottom: 2px solid #1f2937; padding-bottom: 4px; margin-bottom: 8px; text-transform: uppercase; }
        
        .list-item { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 6px; background: #151f32; margin-bottom: 4px; border-radius: 4px; }
        #chat-flow { max-height: 110px; overflow-y: auto; font-size: 11px; min-height: 80px; }
        .chat-msg { margin-bottom: 3px; border-left: 3px solid #38bdf8; padding-left: 5px; }
        .chat-msg.gift-msg { border-left: 3px solid #ec4899; background: rgba(236, 72, 153, 0.1); }
        .chat-msg .username { color: #38bdf8; font-weight: bold; }
        .chat-msg .cmd { color: #fff; }
        .chat-msg .gift-highlight { color: #ec4899; font-weight: bold; text-shadow: 0 0 5px #ec4899; }

        #rules-bar {
            grid-column: 1 / -1; background: #111827; border: 1px solid #ffbc00;
            border-radius: 8px; padding: 8px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; text-align: center;
        }
        .rule-card h4 { color: #ffbc00; font-size: 10px; }
        .rule-card p { color: #9ca3af; font-size: 9px; }

        @media (max-width: 480px) { #rules-bar { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <!-- YAYINCI KONTROL VE AYAR PANELİ (YAYINDAYKEN DEĞİŞTİRİLEBİLİR) -->
    <div id="streamer-panel">
        <div class="panel-row">
            <input type="text" id="ttAccount" placeholder="@TikTokKullaniciAdi">
            <button class="btn-connect" onclick="connectTikTokLive()">Yayına Bağlan</button>
            <span id="status-text" style="color:#ef4444; font-size:11px; font-weight:bold;">BAĞLANTI YOK</span>
            <button class="btn-reset" onclick="clearMap()">Sıfırla</button>
        </div>
        
        <!-- Yayıncının Değiştirebileceği Asker Miktarları -->
        <div class="gift-settings">
            <div class="gift-input-group">
                <label>🌹 Gül Askeri</label>
                <input type="number" id="g_rose" value="50">
            </div>
            <div class="gift-input-group">
                <label>🎵 TikTok Askeri</label>
                <input type="number" id="g_tiktok" value="150">
            </div>
            <div class="gift-input-group">
                <label>💸 Para Yağmuru</label>
                <input type="number" id="g_money" value="500">
            </div>
            <div class="gift-input-group">
                <label>🦁 Aslan Askeri</label>
                <input type="number" id="g_lion" value="2000">
            </div>
            <div class="gift-input-group">
                <label>🌌 Evren Askeri</label>
                <input type="number" id="g_universe" value="5000">
            </div>
        </div>
    </div>

    <div id="map-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="bottom-layout">
        <div class="box">
            <h3>🏆 Canlı Skor Sıralaması</h3>
            <div id="leaderboard"></div>
        </div>

        <div class="box">
            <h3>💬 Canlı Yayın ve Hediye Akışı</h3>
            <div id="chat-flow"></div>
        </div>

        <div class="box">
            <h3>🤝 Diploması & İttifaklar</h3>
            <div id="alliances-list" style="font-size: 12px; color: #38bdf8;">Henüz ittifak yok...</div>
        </div>

        <div id="rules-bar">
            <div class="rule-card"><h4>HARİTAYA GİRİŞ</h4><p>join [bölge_no]</p></div>
            <div class="rule-card"><h4>SALDIRI</h4><p>attack [bölge_no]</p></div>
            <div class="rule-card"><h4>EKRANA TIKLA</h4><p>Her 10 Beğeni = +1 Asker</p></div>
            <div class="rule-card"><h4>HEDİYE DESTEĞİ</h4><p>Gül / Aslan (Anında Ordu)</p></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let regions = {};
        let players = {};
        let alliances = [];
        let playerLikes = {}; // Kullanıcıların beğenilerini saymak için
        const colors = ['#22c55e', '#3b82f6', '#a855f7', '#ef4444', '#eab308', '#ec4899', '#06b6d4', '#f97316', '#10b981', '#6366f1'];

        const hexRadius = 26; 
        const hexHeight = hexRadius * Math.sqrt(3);
        const cols = 10;
        const rows = 10;

        function initGame() {
            let id = 1;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (id <= 100) {
                        let x = c * hexRadius * 1.5 + hexRadius;
                        let y = r * hexHeight + (c % 2 * hexHeight / 2) + hexHeight / 2;
                        regions[id] = { id: id, x: x, y: y, owner: null, army: 0, maxArmy: 0, underAttack: false };
                        id++;
                    }
                }
            }
            resizeContainer();
        }

        function resizeContainer() {
            const container = document.getElementById('map-container');
            const totalWidth = cols * hexRadius * 1.5 + hexRadius;
            const totalHeight = rows * hexHeight + (hexHeight / 2);
            const screenWidth = container.clientWidth;
            const scaleFactor = screenWidth / totalWidth;
            
            canvas.width = screenWidth;
            canvas.height = totalHeight * scaleFactor;
            container.style.height = canvas.height + "px";

            drawMap(scaleFactor);
        }
        window.addEventListener('resize', resizeContainer);

        function drawMap(scale) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.scale(scale, scale);

            for (let i = 1; i <= 100; i++) {
                let reg = regions[i];
                ctx.beginPath();
                for (let j = 0; j < 6; j++) {
                    let angle = j * Math.PI / 3;
                    ctx.lineTo(reg.x + hexRadius * Math.cos(angle), reg.y + hexRadius * Math.sin(angle));
                }
                ctx.closePath();

                if (reg.owner) { ctx.fillStyle = players[reg.owner].color; }
                else { ctx.fillStyle = '#1c2638'; }
                ctx.fill();

                // KRİTİK SEVİYE - ALEV SİMÜLASYONU
                if (reg.underAttack && reg.army > 0 && reg.army < (reg.maxArmy * 0.35)) {
                    ctx.strokeStyle = Math.random() > 0.5 ? '#ff4500' : '#ffcc00';
                    ctx.lineWidth = 4;
                } else {
                    ctx.strokeStyle = reg.owner ? '#ffffff' : '#2d3950';
                    ctx.lineWidth = reg.owner ? 2 : 1;
                }
                ctx.stroke();

                ctx.fillStyle = reg.owner ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.15)';
                ctx.font = 'bold 10px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(reg.id, reg.x, reg.y - 7);

                if (reg.owner) {
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '900 10px Arial';
                    ctx.fillText(reg.owner.substring(0, 7), reg.x, reg.y + 4);
                    ctx.fillStyle = (reg.underAttack && reg.army < (reg.maxArmy * 0.35)) ? '#ff3333' : '#00ffcc';
                    ctx.font = 'bold 9px Arial';
                    ctx.fillText(`⚔️${Math.floor(reg.army)}`, reg.x, reg.y + 14);
                }
            }
            ctx.restore();
        }

        // 1. OYUNCU KAYIT VE RENK SİSTEMİ
        function checkAndRegisterPlayer(user) {
            if (!players[user]) {
                players[user] = { color: colors[Object.keys(players).length % colors.length] };
            }
        }

        // 2. YORUM/KOMUT YORUMLAYICI MOTOR
        function handleTikTokChat(user, message) {
            user = user.trim(); message = message.trim();
            if (!user || !message) return;

            let lowerMsg = message.toLowerCase();
            checkAndRegisterPlayer(user);

            if (lowerMsg.startsWith('join ')) {
                let id = parseInt(lowerMsg.replace('join ', ''));
                if (id >= 1 && id <= 100 && !regions[id].owner) {
                    regions[id].owner = user;
                    regions[id].army = 50; regions[id].maxArmy = 50;
                    pushLog(user, `${id} numaralı bölgeyi fethetti!`, false);
                    refreshUI();
                }
            }
            else if (lowerMsg === '99') {
                let reinforced = false;
                for (let i = 1; i <= 100; i++) {
                    if (regions[i].owner === user) {
                        regions[i].army += 25;
                        if (regions[i].army > regions[i].maxArmy) regions[i].maxArmy = regions[i].army;
                        reinforced = true;
                    }
                }
                if (reinforced) { refreshUI(); }
            }
            else if (lowerMsg.startsWith('attack ')) {
                let id = parseInt(lowerMsg.replace('attack ', ''));
                if (id >= 1 && id <= 100) startSiegeEngine(user, id);
            }
            else if (lowerMsg === 'all attack') {
                for (let i = 1; i <= 100; i++) {
                    if (regions[i].owner && regions[i].owner !== user) startSiegeEngine(user, i);
                }
            }
            else if (lowerMsg.startsWith('ittifak ')) {
                let id = parseInt(lowerMsg.replace('ittifak ', ''));
                if (id >= 1 && id <= 100) {
                    let allyTarget = regions[id].owner;
                    if (allyTarget && allyTarget !== user) {
                        if (!alliances.some(p => p.includes(user) && p.includes(allyTarget))) {
                            alliances.push([user, allyTarget]);
                            document.getElementById('alliances-list').innerHTML = '🤝 İttifaklar: ';
                            alliances.forEach(p => { document.getElementById('alliances-list').innerHTML += `[${p[0]}-${p[1]}] `; });
                        }
                    }
                }
            }
        }

        // 3. ENTEGRE HEDİYE ALICI MOTORU (YAYINCI PANELİNDEN GELEN DEĞERLERİ OKUR)
        function handleTikTokGift(user, giftName) {
            checkAndRegisterPlayer(user);
            let armyCount = 0;
            let formattedName = giftName.toLowerCase();

            // Paneldeki anlık input kutularından güncel verileri çekiyoruz
            if (formattedName.includes("rose") || formattedName.includes("gül")) {
                armyCount = parseInt(document.getElementById('g_rose').value) || 50;
            } else if (formattedName.includes("tiktok")) {
                armyCount = parseInt(document.getElementById('g_tiktok').value) || 150;
            } else if (formattedName.includes("money") || formattedName.includes("yağmur") || formattedName.includes("para")) {
                armyCount = parseInt(document.getElementById('g_money').value) || 500;
            } else if (formattedName.includes("lion") || formattedName.includes("aslan")) {
                armyCount = parseInt(document.getElementById('g_lion').value) || 2000;
            } else if (formattedName.includes("universe") || formattedName.includes("evren") || formattedName.includes("galaksi")) {
                armyCount = parseInt(document.getElementById('g_universe').value) || 5000;
            } else {
                // Listede olmayan küçük bir hediye geldiyse teselli olarak 30 asker ver
                armyCount = 30;
            }

            pushLog(user, `Hediye Gönderdi: ${giftName} (+${armyCount} Asker!)`, true);

            // Oyuncunun haritada kalesi var mı bak, varsa hepsine bölüştür veya ekle
            let added = false;
            for (let i = 1; i <= 100; i++) {
                if (regions[i].owner === user) {
                    regions[i].army += armyCount;
                    if (regions[i].army > regions[i].maxArmy) regions[i].maxArmy = regions[i].army;
                    added = true;
                }
            }

            // Eğer hiç bölgesi yoksa, haritadaki rastgele boş bir bölgeyi ona hediye ordusuyla tahsis et!
            if (!added) {
                let emptyRegs = Object.values(regions).filter(r => r.owner === null);
                if (emptyRegs.length > 0) {
                    let randomSelected = emptyRegs[Math.floor(Math.random() * emptyRegs.length)];
                    randomSelected.owner = user;
                    randomSelected.army = armyCount;
                    randomSelected.maxArmy = armyCount;
                }
            }
            refreshUI();
        }

        // 4. BEĞENİ (LIKE) ALGILAMA MOTORU
        function handleTikTokLike(user, likeCount) {
            checkAndRegisterPlayer(user);
            if (!playerLikes[user]) playerLikes[user] = 0;
            playerLikes[user] += likeCount;

            // Her 10 beğeni biriktiğinde +1 asker ver
            if (playerLikes[user] >= 10) {
                let addedUnits = Math.floor(playerLikes[user] / 10);
                playerLikes[user] %= 10; // Kalan beğeniyi devret

                let hasRegion = false;
                for (let i = 1; i <= 100; i++) {
                    if (regions[i].owner === user) {
                        regions[i].army += addedUnits;
                        if (regions[i].army > regions[i].maxArmy) regions[i].maxArmy = regions[i].army;
                        hasRegion = true;
                    }
                }
                if (hasRegion) refreshUI();
            }
        }

        // 5. KUŞATMA MOTORU (ZAMANA YAYILI ÇATIŞMA)
        function startSiegeEngine(attacker, targetId) {
            let target = regions[targetId];
            if (!target.owner || target.owner === attacker) return;
            if (alliances.some(p => p.includes(attacker) && p.includes(target.owner))) return;

            let attackWavePower = 0;
            for (let i = 1; i <= 100; i++) {
                if (regions[i].owner === attacker && regions[i].army > 20) {
                    let force = Math.floor(regions[i].army / 3);
                    regions[i].army -= force;
                    attackWavePower += force;
                }
            }

            if (attackWavePower <= 0) return;
            target.underAttack = true;

            let siegeInterval = setInterval(() => {
                if (attackWavePower <= 0 || target.owner === attacker || target.army <= 0) {
                    clearInterval(siegeInterval);
                    target.underAttack = false;
                    refreshUI();
                    return;
                }

                let attackDamage = Math.min(6, attackWavePower);
                attackWavePower -= attackDamage;
                target.army -= (attackDamage * 0.80); // Savunma bonusu

                if (target.army <= 0) {
                    clearInterval(siegeInterval);
                    target.owner = attacker;
                    target.army = Math.max(15, attackWavePower);
                    target.maxArmy = target.army;
                    target.underAttack = false;
                    pushLog(attacker, `${targetId} numaralı kaleyi yıkarak ele geçirdi!`, false);
                }
                refreshUI();
            }, 250);
        }

        function refreshUI() {
            resizeContainer();
            let lb = document.getElementById('leaderboard'); lb.innerHTML = '';
            let scoreboard = {};
            for (let i = 1; i <= 100; i++) {
                if (regions[i].owner) scoreboard[regions[i].owner] = (scoreboard[regions[i].owner] || 0) + regions[i].army;
            }
            Object.entries(scoreboard).sort((a,b) => b[1] - a[1]).slice(0, 5).forEach(([name, army]) => {
                lb.innerHTML += `<div class="list-item"><span><b>■</b> ${name}</span><span>${Math.floor(army)} Asker</span></div>`;
            });
        }

        function pushLog(user, text, isGift) {
            const flow = document.getElementById('chat-flow');
            let m = document.createElement('div');
            m.className = isGift ? "chat-msg gift-msg" : "chat-msg";
            if (isGift) {
                m.innerHTML = `<span class="username">🎁 ${user}</span> <span class="gift-highlight">${text}</span>`;
            } else {
                m.innerHTML = `<span class="username">${user}</span>: <span class="cmd">${text}</span>`;
            }
            flow.appendChild(m);
            if (flow.childNodes.length > 5) flow.removeChild(flow.firstChild);
            flow.scrollTop = flow.scrollHeight;
        }

        function clearMap() { players = {}; alliances = []; playerLikes = {}; initGame(); }

        // 6. TİKTOK CANLI KÖPRÜSÜNÜ KURMA VE TETİKLEMEK
        function connectTikTokLive() {
            let account = document.getElementById('ttAccount').value.trim();
            if(!account) { alert("Lütfen TikTok kullanıcı adınızı girin!"); return; }
            
            let status = document.getElementById('status-text');
            status.innerText = "BAĞLANILIYOR..."; status.style.color = "#eab308";

            let connection = new TikTokLiveConnector(account);

            // 1. Canlı Yorumları Dinle
            connection.on('chat', data => {
                handleTikTokChat(data.uniqueId, data.comment);
            });

            // 2. Canlı Hediyeleri Dinle (Yeni Eklendi!)
            connection.on('gift', data => {
                handleTikTokGift(data.uniqueId, data.giftName);
            });

            // 3. Canlı Beğenileri Dinle (Yeni Eklendi!)
            connection.on('like', data => {
                handleTikTokLike(data.uniqueId, data.likeCount);
            });

            connection.on('connected', () => {
                status.innerText = "YAYIN AKTİF ✔"; status.style.color = "#22c55e";
            });

            connection.on('disconnected', () => {
                status.innerText = "BAĞLANTI KOPTU"; status.style.color = "#ef4444";
            });
        }

        initGame();
    </script>
</body>
</html>
