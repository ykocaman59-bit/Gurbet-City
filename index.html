<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Warzone TR Map</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        body { background-color: #0c101a; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }
        
        .game-container {
            width: 100%;
            max-width: 500px;
            background: #111827;
            border: 2px solid #1f2937;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        /* Fotoğraftaki gibi sınırları net ve birleşik duran harita alanı */
        .map-box {
            width: 100%;
            position: relative;
            background: #1e1b4b; /* Fotoğraftaki koyu mor/mavi arka plan tonu */
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 1000 / 500;
        }

        svg { width: 100%; height: 100%; display: block; }

        /* Gerçek İl Sınırları - Yapboz Parçaları */
        .il-bölgesi {
            stroke: #030712; /* İlleri ayıran net koyu çizgiler */
            stroke-width: 1.5;
            transition: fill 0.2s ease;
            cursor: pointer;
        }
        .il-bölgesi:hover {
            filter: brightness(1.3);
        }

        /* İllerin ortasındaki sayıların katmanı */
        .labels-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }

        .il-no {
            position: absolute;
            transform: translate(-50%, -50%);
            font-size: 10px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 1px 1px 2px #000, -1px -1px 2px #000;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="map-box">
            <!-- Fotoğraftaki gibi gerçek coğrafi bütünlükte il sınırları şablonu -->
            <svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
                <g id="harita-gövcesi"></g>
            </svg>
            <div class="labels-overlay" id="sayi-katmani"></div>
        </div>
    </div>

    <script>
        // Fotoğraftaki canlı yayın renk paleti
        const warzoneRenkleri = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#14b8a6', '#6366f1'];

        // Türkiye haritasının basitleştirilmiş koordinat doğruluğuna sahip yapboz matrisi (Örnek test blokları)
        const illerMatrisi = [
            { id: 1, ad: "Adana", d: "M 530 380 L 570 370 L 560 420 L 520 410 Z", cx: 545, cy: 395 },
            { id: 2, ad: "Ankara", d: "M 400 220 L 480 230 L 460 300 L 390 280 Z", cx: 432, cy: 257 },
            { id: 3, ad: "İstanbul", d: "M 180 140 L 240 150 L 230 180 L 170 170 Z", cx: 205, cy: 160 },
            { id: 4, ad: "İzmir", d: "M 80 260 L 130 270 L 110 340 L 70 320 Z", cx: 100, cy: 297 },
            { id: 5, ad: "Antalya", d: "M 300 380 L 380 390 L 360 440 L 290 420 Z", cx: 332, cy: 407 },
            { id: 6, ad: "Konya", d: "M 380 310 L 460 320 L 440 400 L 370 380 Z", cx: 412, cy: 352 },
            { id: 7, ad: "Diyarbakır", d: "M 750 320 L 820 310 L 810 360 L 740 360 Z", cx: 780, cy: 337 },
            { id: 8, ad: "Erzurum", d: "M 780 200 L 860 210 L 840 270 L 770 260 Z", cx: 812, cy: 235 },
            { id: 9, ad: "Sivas", d: "M 560 230 L 640 240 L 620 310 L 550 290 Z", cx: 592, cy: 267 },
            { id: 10, ad: "Trabzon", d: "M 680 160 L 740 170 L 730 210 L 670 200 Z", cx: 705, cy: 185 },
            { id: 11, ad: "Şanlıurfa", d: "M 660 370 L 740 360 L 730 410 L 650 410 Z", cx: 695, cy: 387 },
            { id: 12, ad: "Bursa", d: "M 200 190 L 260 200 L 250 240 L 190 230 Z", cx: 225, cy: 215 },
            { id: 13, ad: "Van", d: "M 880 280 L 960 290 L 940 360 L 870 350 Z", cx: 912, cy: 320 }
            // Gerçek sistemde bu liste 81 ile tam oturacak şekilde yayılır
        ];

        document.addEventListener("DOMContentLoaded", () => {
            const haritaGövdesi = document.getElementById("harita-gövcesi");
            const sayiKatmani = document.getElementById("sayi-katmani");

            illerMatrisi.forEach((il) => {
                let rastgeleRenk = warzoneRenkleri[Math.floor(Math.random() * warzoneRenkleri.length)];

                // İl sınır çizgisini (path) oluşturma
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", il.d);
                path.setAttribute("class", "il-bölgesi");
                path.setAttribute("id", `il-${il.id}`);
                path.style.fill = rastgeleRenk;

                // Tıklayınca rengini değiştirme (Hediye atılma simülasyonu)
                path.addEventListener("click", () => {
                    let yeniRenk = warzoneRenkleri[Math.floor(Math.random() * warzoneRenkleri.length)];
                    path.style.fill = yeniRenk;
                });

                haritaGövdesi.appendChild(path);

                // Numarayı tam ilin orta koordinatına sabitleme
                const label = document.createElement("div");
                label.className = "il-no";
                label.style.left = `${(il.cx / 1000) * 100}%`;
                label.style.top = `${(il.cy / 500) * 100}%`;
                label.innerHTML = il.id;

                sayiKatmani.appendChild(label);
            });
        });
    </script>
</body>
</html>
