<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATTLEZONE LİVE</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0f17;
            color: #f1f5f9;
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 20px;
        }

        /* 1000193060.PNG GÖRSELİNDEKİ DIKEY EKRA GENİŞLİĞİ VE DÜZENİ */
        .app-container {
            width: 100%;
            max-width: 450px; /* Tam dikey mobil yayın genişliği */
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 10px;
        }

        /* SİNEMATİK GİRİŞ ANİMASYONU */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #070a12;
            z-index: 100000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }

        .animated-title {
            font-size: 36px;
            font-weight: 900;
            color: #2563eb;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(37, 99, 235, 0.6);
            animation: introBlast 2.3s ease-in-out forwards;
        }

        @keyframes introBlast {
            0% { transform: scale(0.7); opacity: 0; filter: blur(10px); }
            40% { transform: scale(1.05); opacity: 1; filter: blur(0px); }
            70% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.2); opacity: 0; filter: blur(5px); }
        }

        /* GİRİŞ VE ANA MENÜ EKRANI */
        #launch-menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease-in-out;
        }

        .login-box {
            background: #111827;
            border: 2px solid #2563eb;
            border-radius: 16px;
            padding: 35px 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.7);
        }

        .login-box h2 {
            color: #2563eb;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 26px;
        }

        .menu-btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-btn {
            width: 100%;
            background: #1f2937;
            border: 1px solid #4b5563;
            color: white;
            border-radius: 8px;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .menu-btn:hover {
            background: #2563eb;
            border-color: #3b82f6;
            transform: translateY(-2px);
        }

        .menu-btn.primary { background: #2563eb; border: none; }
        .menu-btn.primary:hover { background: #1d4ed8; }

        #connection-form { display: none; margin-top: 20px; text-align: left; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; color: #9ca3af; font-size: 12px; margin-bottom: 6px; text-transform: uppercase; }
        
        .input-group input {
            width: 100%;
            background: #1f2937;
            border: 1px solid #4b5563;
            border-radius: 8px;
            padding: 12px 16px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        .slider-wrapper { margin-top: 10px; margin-bottom: 20px; }
        .slider-val-display { float: right; color: #fbbf24; font-weight: bold; font-size: 14px; }
        .custom-slider { width: 100%; accent-color: #2563eb; cursor: pointer; margin-top: 8px; }

        /* ÖZEL PENCERELER (MODALLAR) */
        .custom-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .modal-box {
            background: #111827;
            padding: 25px;
            border-radius: 16px;
            width: 85%;
            max-width: 360px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
            position: relative;
        }

        .modal-box.leader-border { border: 2px solid #fbbf24; }
        .modal-close-x { position: absolute; top: 12px; right: 15px; font-size: 20px; color: #9ca3af; cursor: pointer; font-weight: bold; }
        .modal-close-x:hover { color: #fff; }
        .modal-box h3 { margin-bottom: 15px; font-size: 20px; color: #fbbf24; text-align: center; }

        /* ÜST PANEL VE UI */
        #ui {
            background: #111827;
            border: 2px solid #1e293b;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ui-title { font-weight: bold; color: #3b82f6; letter-spacing: 1px; }

        /* SİZİN ORİJİNAL SVG HARİTA ALANINIZ */
        #map-container {
            background: #111827;
            border: 2px solid #1e293b;
            border-radius: 12px;
            padding: 10px;
            width: 100%;
            height: 50vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        svg { width: 100%; height: 100%; }
        .region { stroke: #fff; stroke-width: 1; cursor: pointer; transition: 0.3s; }
        .region:hover { opacity: 0.8; }
        .label { font-size: 12px; font-weight: bold; fill: #000; pointer-events: none; }

        /* EN ALT KISIM: FOTOĞRAFTAKİ KURALLAR PANELİ */
        .rules-panel {
            background: #111827;
            border: 2px solid #ef4444;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .rules-header {
            color: #ef4444;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 4px;
        }

        .rules-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            background: #1e293b;
            padding: 10px;
            border-radius: 8px;
        }

        .rule-card {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 8px;
            font-size: 12px;
        }

        .rule-title { color: #94a3b8; margin-bottom: 2px; font-weight: bold; }
        .rule-value { color: #22c55e; font-weight: bold; font-size: 13px; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="animated-title">BATTLEZONE LİVE</div>
    </div>

    <div id="custom-leaderboard-modal" class="custom-modal">
        <div class="modal-box leader-border">
            <span class="modal-close-x" onclick="closeLeaderboardModal()">×</span>
            <h3>🏆 BAŞARI SIRALAMASI</h3>
            <div id="lb-content" style="background: #0f172a; border: 1px solid #1e293b; border-radius: 8px; max-height: 250px; overflow-y: auto; padding: 10px; font-size:13px; text-align:center; color:#64748b;">
                Aktif veri bulunmuyor.
            </div>
        </div>
    </div>

    <div id="launch-menu-overlay">
        <div class="login-box">
            <h2>BATTLEZONE LİVE</h2>
            
            <div class="menu-btn-group" id="main-menu-buttons">
                <button class="menu-btn primary" onclick="showConnectionForm()">YENİ OYUN BAŞLAT</button>
                <button class="menu-btn" onclick="openLeaderboardModal()">🏆 BAŞARI SIRALAMASI</button>
            </div>

            <div id="connection-form">
                <div class="input-group">
                    <label>Kullanıcı Adı</label>
                    <input type="text" id="user" placeholder="Kullanıcı adınızı girin" autocomplete="off">
                </div>

                <div class="slider-wrapper">
                    <label style="color: #9ca3af; font-size: 12px; text-transform: uppercase;">
                        Harita Bölge Sayısı: <span class="slider-val-display" id="slider-val">100</span>
                    </label>
                    <input type="range" min="10" max="100" step="10" value="100" class="custom-slider" id="zone-slider" oninput="updateSliderDisplay(this.value)">
                </div>

                <button class="menu-btn primary" onclick="start()">SAVAŞI BAŞLAT ⚔️</button>
                <button class="menu-btn" style="margin-top:10px; font-size:12px; padding:8px;" onclick="hideConnectionForm()">← Geri Dön</button>
            </div>
        </div>
    </div>

    <div class="app-container">
        
        <div id="ui">
            <span class="ui-title">BATTLEZONE LİVE</span>
            <button class="menu-btn" style="width:auto; padding: 6px 12px; font-size: 12px; border-radius: 6px;" onclick="openLeaderboardModal()">🏆 KAZANANLAR</button>
        </div>

        <div id="map-container">
            <svg viewBox="0 0 1000 500" id="map-svg"></svg>
        </div>

        <div class="rules-panel">
            <div class="rules-header">🎁 HEDİYE VE ORDU KURALLARI</div>
            <div class="rules-grid">
                <div class="rule-card"><div class="rule-title">🌹 Gül</div><div class="rule-value">+50 Ordu</div></div>
                <div class="rule-card"><div class="rule-title">🎵 TikTok</div><div class="rule-value">+150 Ordu</div></div>
                <div class="rule-card"><div class="rule-title">💸 Para Yağmuru</div><div class="rule-value">+500 Ordu</div></div>
                <div class="rule-card"><div class="rule-title">🦁 Aslan</div><div class="rule-value">+2000 Ordu</div></div>
            </div>
        </div>

    </div>

    <script>
        const colors = ["#FFADAD", "#FFD6A5", "#FDFFB6", "#CAFFBF", "#9BF6FF", "#A0C4FF", "#BDB2FF", "#FFC6FF", "#FF9F1C"];
        let regions = []; 
        let totalZones = 100;

        // Sayfa yüklenince animasyon ve menü yönetimi
        window.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                const splash = document.getElementById("splash-screen");
                splash.style.opacity = "0";
                setTimeout(() => {
                    splash.style.display = "none";
                }, 800);
            }, 2300);
        });

        function updateSliderDisplay(val) {
            document.getElementById("slider-val").innerText = val;
            totalZones = parseInt(val);
        }

        function showConnectionForm() {
            document.getElementById("main-menu-buttons").style.display = "none";
            document.getElementById("connection-form").style.display = "block";
        }

        function hideConnectionForm() {
            document.getElementById("connection-form").style.display = "none";
            document.getElementById("main-menu-buttons").style.display = "flex";
        }

        function openLeaderboardModal() {
            document.getElementById('custom-leaderboard-modal').style.display = 'flex';
        }
        
        function closeLeaderboardModal() {
            document.getElementById('custom-leaderboard-modal').style.display = 'none';
        }

        // SİZİN ORİJİNAL START VE GENERATE MAP FONKSİYONLARINIZ (BOZULMADAN)
        function start() {
            document.getElementById('launch-menu-overlay').style.display = 'none';
            generateMap();
        }

        function generateMap() {
            const svg = document.getElementById('map-svg');
            svg.innerHTML = ""; // Yeniden başlatma için temizleme
            
            // Seçilen bölge sayısına göre (totalZones) dinamik dizi oluşturma
            let nums = Array.from({length: totalZones}, (_,i) => i+1).sort(() => Math.random() - 0.5);
            
            // Sizin döngünüz ve path oluşturma mekanizmanız aynen kalıyor
            for(let i=0; i<totalZones; i++) {
                let g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                let path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                
                // Rastgele renk ve konum ataması (Buraya kendi Türkiye haritası path'lerinizi gelecekte bağlayabilirsiniz)
                path.setAttribute("d", "M 10 10 L 50 10 L 50 50 L 10 50 Z"); 
                path.style.fill = colors[Math.floor(Math.random() * colors.length)];
                path.className = "region";
                
                let text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.textContent = nums[i];
                text.setAttribute("x", "20"); text.setAttribute("y", "30");
                text.className = "label";
                
                g.appendChild(path);
                g.appendChild(text);
                svg.appendChild(g);
            }
        }
    </script>
</body>
</html>
