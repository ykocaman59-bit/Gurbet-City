<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battlezone Canlı Savaş</title>
    <style>
        body { background-color: #0b0f17; color: #fff; margin: 0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 10px; }
        
        /* ANİMASYON */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #070a12; z-index: 100000; display: flex; align-items: center; justify-content: center; }
        .animated-title { font-size: 36px; font-weight: 900; color: #2563eb; text-transform: uppercase; animation: introBlast 2s ease-in-out forwards; }
        @keyframes introBlast { 0% { transform: scale(0.7); opacity: 0; } 100% { transform: scale(1.2); opacity: 0; display: none; } }

        /* ARAYÜZ */
        #launch-menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: #111827; padding: 25px; border-radius: 16px; border: 2px solid #2563eb; text-align: center; width: 90%; max-width: 400px; }
        input { padding: 12px; width: 90%; border-radius: 8px; border: none; margin-bottom: 10px; }
        button { width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* HARİTA VE IZGARA */
        .map-wrapper { 
            position: relative; width: 100%; max-width: 500px; margin-top: 10px;
            background: url('1000193060.png') no-repeat center/contain;
            aspect-ratio: 1.6; border: 2px solid #1f2937; border-radius: 10px;
        }
        .grid-container { display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(10, 1fr); width: 100%; height: 100%; }
        .zone { border: 0.5px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 7px; color: #fbbf24; background: rgba(0,0,0,0.2); }

        /* YENİ PANEL DETAYLARI */
        .panels { width: 100%; max-width: 500px; margin-top: 10px; display: flex; flex-direction: column; gap: 10px; }
        .panel { background: #111827; padding: 10px; border-radius: 10px; border: 1px solid #1f2937; font-size: 12px; }
        .gift-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
    </style>
</head>
<body>

    <div id="splash-screen"><div class="animated-title">BATTLEZONE LIVE</div></div>

    <div id="launch-menu-overlay">
        <div class="login-box">
            <h2>BATTLEZONE</h2>
            <input type="text" id="username" placeholder="TikTok ID Gir">
            <button onclick="startWar()">SAVAŞI BAŞLAT</button>
        </div>
    </div>

    <div class="map-wrapper">
        <div class="grid-container" id="grid"></div>
    </div>

    <div class="panels">
        <div class="panel">
            <div class="gift-grid">
                <div>🌹 Gül <br> 50</div>
                <div>🎵 TikTok <br> 150</div>
                <div>💸 Para <br> 500</div>
                <div>🦁 Aslan <br> 1000</div>
            </div>
        </div>
        <div class="panel" style="height: 80px;">💬 SOHBET AKIŞI</div>
    </div>

    <script>
        setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 2000);

        function startWar() {
            document.getElementById('launch-menu-overlay').style.display = 'none';
            const grid = document.getElementById('grid');
            for(let i=1; i<=100; i++) {
                const div = document.createElement('div');
                div.className = 'zone';
                div.innerHTML = `<b>${i}</b><span id="z-${i}">-</span>`;
                grid.appendChild(div);
            }
        }
    </script>
</body>
</html>
