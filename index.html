<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok İnteraktif Bölge Savaşları PRO</title>
    <script src="https://unpkg.com/@tiktokmenu/web-connector@1.0.0/dist/tiktok-connect.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body {
            background-color: #0f141c; color: white; margin: 0; padding: 15px;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        
        /* Üst Kontrol Paneli */
        #top-panel {
            display: flex; justify-content: space-between; align-items: center;
            background: #161d2a; padding: 12px 20px; border-radius: 10px;
            border: 1px solid #232e42; margin-bottom: 15px;
        }
        .tiktok-connect-area { display: flex; gap: 10px; align-items: center; }
        input, select {
            background: #1f293a; color: white; border: 1px solid #3b4a6b;
            padding: 8px 12px; border-radius: 6px; font-size: 14px;
        }
        button {
            padding: 8px 16px; font-weight: bold; border-radius: 6px;
            cursor: pointer; border: none; transition: 0.2s;
        }
        button.connect { background: #ff0050; color: white; } /* TikTok Pembesi */
        button.connect.active { background: #00f2fe; color: #0f141c; }
        button.end-game { background: #e53e3e; color: white; }

        /* Ana Ekran Düzeni */
        #main-container { display: flex; flex: 1; gap: 15px; overflow: hidden; }

        /* Sol Taraf: Canlı Strateji Haritası */
        #map-wrapper {
            flex: 2.5; background: #121824; border-radius: 12px;
            border: 2px solid #232e42; padding: 15px; overflow-y: auto;
            position: relative;
        }
        #map {
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px;
        }
        
        /* Görsel Bölge Tasarımı (1000192173.png stili) */
        .region {
            aspect-ratio: 1.1; background: #2a3547; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: bold; border: 2px solid #3d4f6d; position: relative;
            transition: all 0.3s ease; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .region .id-num { font-size: 14px; color: rgba(255,255,255,0.4); position: absolute; top: 3px; left: 5px; }
        .region .owner-name { font-size: 11px; color: #ffffff; text-shadow: 1px 1px 3px #000; font-weight: 800; text-align: center; max-width: 90%; overflow: hidden; }
        .region .army-count { font-size: 11px; color: #00ffcc; font-weight: bold; margin-top: 2px; }

        /* Sağ Taraf: Skorlar ve Canlı Akış */
        #sidebar {
            flex: 1; display: flex; flex-direction: column; gap: 15px; overflow-y: auto;
        }
        .panel-box { background: #161d2a; border: 1px solid #232e42; padding: 12px; border-radius: 10px; }
        .panel-box h3 { margin: 0 0 10px 0; font-size: 13px; color: #ffbc00; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #232e42; padding-bottom: 5px; }
        
        ul { list-style: none; padding: 0; margin: 0; }
        li { padding: 6px 10px; background: #1f293a; margin-bottom: 5px; border-radius: 5px; font-size: 12px; display: flex; justify-content: space-between; }

        /* Savaş Animasyon Efekti */
        @keyframes attackPulse {
            0% { transform: scale(1); border-color: #ff0050; }
            50% { transform: scale(1.05); border-color: #ffbc00; box-shadow: 0 0 15px #ff0050; }
            100% { transform: scale(1); border-color: #ff0050; }
        }
        .under-attack { animation: attackPulse 0.5s infinite; z-index: 10; }
    </style>
</head>
<body>

    <div id="top-panel">
        <div class="tiktok-connect-area">
            <input type="text" id="tiktok-username" placeholder="@ Kulanıcı Adı (Örn: cootv)">
            <button class="connect" id="btn-connect" onclick="toggleTikTokConnection()">Yayına Bağlan</button>
            <span id="connection-status" style="font-size: 12px; color: #a0aec0;">Bağlı Değil</span>
        </div>
        <h2 style="margin: 0; font-size: 18px; letter-spacing: 1px;">TÜM BÖLGELERİ ELE GEÇİR!</h2>
        <button class="end-game" onclick="finishGame()">Oyunu Bitir (Win Kaydet)</button>
    </div>

    <div id="main-container">
        
        <div id="map-wrapper">
            <div id="map"></div>
        </div>

        <div id="sidebar">
            
            <div class="panel-box">
                <h3>🏆 LİDERLİK TABLOSU</h3>
                <ul id="leaderboard"></ul>
            </div>

            <div class="panel-box">
                <h3>🤝 AKTİF İTTİFAKLAR</h3>
                <ul id="alliances-list"></ul>
            </div>

            <div class="panel-box">
                <h3>⚙️ HEDİYE / ASKER AYARLARI</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 11px;">
                    <div>Gül: <input type="number" id="cfg-gul" value="50" onchange="saveConfig()" style="width:100%;"></div>
                    <div>TikTok: <input type="number" id="cfg-tiktok" value="100" onchange="saveConfig()" style="width:100%;"></div>
                    <div>Aslan: <input type="number" id="cfg-aslan" value="500" onchange="saveConfig()" style="width:100%;"></div>
                </div>
            </div>

            <div class="panel-box">
                <h3>👑 GEÇMİŞ KAZANANLAR (ANAMENÜ)</h3>
                <ul id="win-history"></ul>
            </div>

        </div>
    </div>

    <script>
        // Sistem Değişkenleri
        let regions = {};
        let players = {};
        let alliances = [];
        let tiktokConnection = null;
        let winHistory = JSON.parse(localStorage.getItem('tiktok_device_wins')) || [];
        let giftConfig = { "Gül": 50, "TikTok": 100, "Aslan": 500 };
        
        const colors = ['#e53e3e', '#3182ce', '#38a169', '#d69e2e', '#805ad5', '#e066ff', '#00bfff', '#ff1493', '#ff8c00', '#48bb78', '#10b981', '#f59e0b'];

        // Haritayı 100 Bölge Olarak İnşa Et
        function initMap() {
            const mapDiv = document.getElementById('map');
            mapDiv.innerHTML = '';
            for (let i = 1; i <= 100; i++) {
                regions[i] = { id: i, owner: null, army: 0 };
                
                let div = document.createElement('div');
                div.className = 'region';
                div.id = `reg-${i}`;
                div.innerHTML = `<span class="id-num">${i}</span><span class="owner-name"></span><span class="army-count"></span>`;
                mapDiv.appendChild(div);
            }
            updateWinHistoryUI();
            updateMapUI();
        }

        // Harita Görsel Güncellemesi
        function updateMapUI() {
            for (let i = 1; i <= 100; i++) {
                let reg = regions[i];
                let div = document.getElementById(`reg-${i}`);
                let ownerSpan = div.querySelector('.owner-name');
                let armySpan = div.querySelector('.army-count');

                if (reg.owner) {
                    div.style.backgroundColor = players[reg.owner].color;
                    div.style.borderColor = '#ffffff';
                    ownerSpan.innerText = reg.owner;
                    armySpan.innerText = reg.army;
                } else {
                    div.style.backgroundColor = '#2a3547';
                    div.style.borderColor = '#3d4f6d';
                    ownerSpan.innerText = '';
                    armySpan.innerText = '';
                }
            }
            updateLeaderboard();
        }

        function saveConfig() {
            giftConfig["Gül"] = parseInt(document.getElementById('cfg-gul').value) || 50;
            giftConfig["TikTok"] = parseInt(document.getElementById('cfg-tiktok').value) || 100;
            giftConfig["Aslan"] = parseInt(document.getElementById('cfg-aslan').value) || 500;
        }

        // --- GERÇEK TİKTOK CHAT VE KOMUT ALGORİTMASI ---
        function handleLiveData(user, text) {
            text = text.trim().toLowerCase();

            // 1. HARİTADAN YER ALMA (join 11) - İstediğin gibi: Boşsa alacak, doluysa yaramayacak
            if (text.startsWith('join ')) {
                let num = parseInt(text.replace('join ', ''));
                if (num >= 1 && num <= 100) {
                    if (!regions[num].owner) { // Bölge boş mu kontrolü
                        if (!players[user]) {
                            players[user] = { color: colors[Object.keys(players).length % colors.length], score: 100 };
                        }
                        regions[num].owner = user;
                        regions[num].army = 25; // Başlangıç askeri gücü
                        updateMapUI();
                    }
                }
            }
            
            // 2. YORUMA 99 YAZARAK ASKER EKLEME
            else if (text === '99') {
                let updated = false;
                for (let i = 1; i <= 100; i++) {
                    if (regions[i].owner === user) {
                        regions[i].army += 20; // 99 yazana +20 asker
                        updated = true;
                    }
                }
                if (updated) updateMapUI();
            }

            // 3. TEK BÖLGEYE SAVAŞ AÇMA (attack 12)
            else if (text.startsWith('attack ') && text !== 'all attack') {
                let targetNum = parseInt(text.replace('attack ', ''));
                if (targetNum >= 1 && targetNum <= 100) {
                    executeBattle(user, targetNum);
                }
            }

            // 4. TÜM HARİTAYA SAVAŞ AÇMA (all attack)
            else if (text === 'all attack') {
                for (let i = 1; i <= 100; i++) {
                    if (regions[i].owner && regions[i].owner !== user) {
                        executeBattle(user, i);
                    }
                }
            }

            // 5. İTTİFAK KURMA (ittifak <numara>) - İstediğin gibi: O numarada biri varsa kurulacak, yoksa geçersiz sayılacak
            else if (text.startsWith('ittifak ')) {
                let targetRegNum = parseInt(text.replace('ittifak ', ''));
                if (targetRegNum >= 1 && targetRegNum <= 100) {
                    let targetRegion = regions[targetRegNum];
                    
                    // Bölgede biri var mı? Kontrolü
                    if (targetRegion.owner && targetRegion.owner !== user) {
                        let partner = targetRegion.owner;
                        // Zaten ittifak var mı?
                        let exists = alliances.some(p => p.includes(user) && p.includes(partner));
                        if (!exists) {
                            alliances.push([user, partner]);
                            updateAlliancesUI();
                        }
                    }
                }
            }
        }

        // Savaş Hesaplama Dinamiği
        function executeBattle(attacker, targetId) {
            let targetReg = regions[targetId];
            if (!targetReg.owner || targetReg.owner === attacker) return;

            // İttifak koruması kontrolü
            if (alliances.some(p => p.includes(attacker) && p.includes(targetReg.owner))) return;

            let div = document.getElementById(`reg-${targetId}`);
            div.classList.add('under-attack');

            setTimeout(() => {
                let attackerPower = 0;
                for (let i = 1; i <= 100; i++) {
                    if (regions[i].owner === attacker && regions[i].army > 5) {
                        let force = Math.floor(regions[i].army / 2);
                        regions[i].army -= force;
                        attackerPower += force;
                    }
                }

                if (attackerPower > 0) {
                    if (attackerPower > targetReg.army) {
                        targetReg.owner = attacker;
                        targetReg.army = attackerPower - targetReg.army;
                        players[attacker].score += 150; // Win puanı ekle
                    } else {
                        targetReg.army -= attackerPower;
                    }
                }
                div.classList.remove('under-attack');
                updateMapUI();
            }, 600);
        }

        // Otomatik Gerçek Hediye Okuyucu Algoritması
        function handleLiveGift(user, giftName) {
            if (!players[user]) return;
            let bonus = giftConfig[giftName] || 15;
            for (let i = 1; i <= 100; i++) {
                if (regions[i].owner === user) {
                    regions[i].army += bonus;
                }
            }
            players[user].score += bonus;
            updateMapUI();
        }

        // --- TİKTOK LIVE CONNECTION GATEWAY (TARAYICI BAĞLANTISI) ---
        function toggleTikTokConnection() {
            let username = document.getElementById('tiktok-username').value;
            if (!username) { alert("Lütfen TikTok kullanıcı adınızı yazın!"); return; }

            let statusSpan = document.getElementById('connection-status');
            let btn = document.getElementById('btn-connect');

            if (tiktokConnection == null) {
                statusSpan.innerText = "Bağlanıyor...";
                
                // TikTok Canlı Yayın API Altyapısı Başlatma
                tiktokConnection = new TikTokConnect(username);

                tiktokConnection.on('chat', (data) => {
                    handleLiveData(data.uniqueId, data.comment);
                });

                tiktokConnection.on('gift', (data) => {
                    handleLiveGift(data.uniqueId, data.giftName);
                });

                tiktokConnection.on('connected', () => {
                    statusSpan.innerText = "YAYIN CANLI BAĞLANDI ✔";
                    statusSpan.style.color = "#00ffcc";
                    btn.innerText = "Bağlantıyı Kes";
                    btn.classList.add('active');
                });

                tiktokConnection.on('disconnected', () => {
                    cleanConnectionUI();
                });
                
                // Güvenli test modu emülasyon tetikleyicisi (API kapalıysa çalışması için)
                window.addEventListener('message', e => {
                    if(e.data.type === 'mock-chat') handleLiveData(e.data.user, e.data.text);
                });
            } else {
                tiktokConnection.disconnect();
                cleanConnectionUI();
            }
        }

        function cleanConnectionUI() {
            tiktokConnection = null;
            document.getElementById('connection-status').innerText = "Bağlı Değil";
            document.getElementById('connection-status').style.color = "#a0aec0";
            let btn = document.getElementById('btn-connect');
            btn.innerText = "Yayına Bağlan";
            btn.classList.remove('active');
        }

        // Skorlama ve Arayüz Güncellemeleri
        function updateLeaderboard() {
            let scores = {};
            for (let i = 1; i <= 100; i++) {
                if (regions[i].owner) scores[regions[i].owner] = (scores[regions[i].owner] || 0) + regions[i].army;
            }
            let sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
            let lb = document.getElementById('leaderboard'); lb.innerHTML = '';
            sorted.slice(0, 10).forEach(([p, army]) => {
                lb.innerHTML += `<li><span><b style="color:${players[p].color}">■</b> ${p}</span> <b>${army} Asker</b></li>`;
            });
        }

        function updateAlliancesUI() {
            let al = document.getElementById('alliances-list'); al.innerHTML = '';
            alliances.forEach(p => { al.innerHTML += `<li>🤝 ${p[0]} & ${p[1]}</li>`; });
        }

        // Oyunu Sonlandırıp Cihaza Sıralı Kaydetme Sistemi
        function finishGame() {
            let winner = null; let max = -1;
            Object.keys(players).forEach(p => {
                if (players[p].score > max) { max = players[p].score; winner = p; }
            });

            if (winner) {
                winHistory.push({ name: winner, score: max });
                // Puana göre büyükten küçüğe kusursuz sıralama
                winHistory.sort((a,b) => b.score - a.score);
                // Cihaz lokal hafızasına kaydet (Sıfır Sunucu Maliyeti)
                localStorage.setItem('tiktok_device_wins', JSON.stringify(winHistory));
                updateWinHistoryUI();
                alert(`Oyun Bitti! Şampiyon: ${winner} (${max} Puan)`);
            } else {
                alert("Henüz oyun verisi yok.");
            }
            players = {}; alliances = []; initMap();
        }

        function updateWinHistoryUI() {
            let wh = document.getElementById('win-history'); wh.innerHTML = '';
            winHistory.forEach((win, idx) => {
                // İstediğin sıralama çıktısı: 1. Yusuf 1000 puan
                wh.innerHTML += `<li><b>${idx + 1}. ${win.name}</b> <span>${win.score} Puan</span></li>`;
            });
        }

        initMap();
    </script>
</body>
</html>
