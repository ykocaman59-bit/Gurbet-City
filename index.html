<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Battlezone 100 - Final Sürüm</title>
    <style>
        body { margin: 0; background: #0b0f17; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; font-family: sans-serif; }
        .app-container { width: 100%; max-width: 500px; padding: 10px; }
        
        /* HARİTA ZEMİNİ - Kodular'da 'harita.png' olarak assets'e atılmalı */
        .map-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9; /* Haritanın en-boy oranına göre ayarlandı */
            background-image: url('harita.png');
            background-size: cover;
            background-position: center;
            border: 3px solid #1e293b;
            border-radius: 12px;
            overflow: hidden;
        }

        /* 100 BÖLGE IZGARA */
        .grid-layer {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            width: 100%; height: 100%;
        }

        .zone {
            border: 0.5px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold; color: white;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="map-wrapper">
            <div class="grid-layer" id="grid"></div>
        </div>
        <div style="margin-top:20px; text-align:center;">
            <p id="status">Harita Yükleniyor...</p>
        </div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const zones = {};

        // 100 Bölgeyi Oluştur
        function initGame() {
            for(let i=1; i<=100; i++) {
                const z = document.createElement('div');
                z.className = 'zone';
                z.id = 'zone-'+i;
                z.innerHTML = `<div>${i}</div><div id="info-${i}"></div>`;
                grid.appendChild(z);
                zones[i] = { owner: "", troops: 0 };
            }
            document.getElementById('status').innerText = "Savaş Alanı Hazır!";
        }

        // Oyun Başlatıcı
        initGame();

        // ÖRNEK: Kodular'dan gelen join komutu için fonksiyon
        function processCommand(cmd, username, params) {
            if(cmd === "join") {
                let id = params[0];
                if(zones[id] && zones[id].owner === "") {
                    zones[id].owner = username;
                    zones[id].troops = 20;
                    document.getElementById('zone-'+id).style.backgroundColor = "rgba(0,100,255,0.5)";
                    document.getElementById('info-'+id).innerText = username.substring(0,4);
                }
            }
        }
    </script>
</body>
</html>
