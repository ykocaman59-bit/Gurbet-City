<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATTLEZONE LIVE</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            overflow: hidden;
            height: 100vh;
        }

        /* --- SÜPER GİRİŞ ANİMASYONU VE OVERLAY --- */
        #launch-menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0f19;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeInOverlay 0.5s ease-in-out;
        }

        .menu-box {
            background: #111827;
            border: 2px solid #1e3a8a;
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 25px rgba(30, 58, 138, 0.3);
            animation: slideUpMenu 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .menu-title {
            font-size: 24px;
            font-weight: bold;
            color: #3b82f6;
            margin-bottom: 25px;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .menu-btn {
            width: 100%;
            background: linear-gradient(135deg, #1e40af, #1d4ed8);
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .menu-btn:active {
            transform: scale(0.98);
        }

        .menu-btn.secondary {
            background: linear-gradient(135deg, #d97706, #b45309);
        }

        /* --- KULLANICI ADI GİRİŞ PANELİ --- */
        #username-panel {
            display: none;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            background-color: #1f2937;
            border: 1px solid #4b5563;
            padding: 12px;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #3b82f6;
        }

        /* --- OYUN ANA ARAYÜZÜ --- */
        .game-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
        }

        /* Üst Bar */
        .top-bar {
            background-color: #111827;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1f2937;
        }

        .brand {
            font-weight: bold;
            color: #ef4444;
            font-size: 14px;
            text-transform: uppercase;
        }

        .status-badge {
            font-size: 12px;
            font-weight: 600;
            background-color: #1f2937;
            padding: 6px 12px;
            border-radius: 20px;
            color: #9ca3af;
        }

        .exit-btn {
            background-color: #dc2626;
            color: white;
            border: none;
            padding: 6px 15px;
            font-size: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Canlı Sohbet Alanı */
        .chat-section {
            background-color: #111827;
            margin: 10px;
            border-radius: 12px;
            padding: 12px;
            flex: 1;
            max-height: 220px;
            display: flex;
            flex-direction: column;
            border: 1px solid #1f2937;
        }

        .chat-title {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .chat-msg {
            animation: fadeInMsg 0.2s ease-out;
        }

        .chat-user {
            color: #60a5fa;
            font-weight: bold;
        }

        /* Harita Alanı (1-80 Butonlar) */
        .map-section {
            flex: 2;
            overflow-y: auto;
            padding: 0 10px 10px 10px;
        }

        .map-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .region-btn {
            background-color: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #f3f4f6;
            cursor: pointer;
            padding: 2px;
        }

        .reg-num {
            font-size: 14px;
            font-weight: bold;
        }

        .reg-user {
            font-size: 9px;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            text-align: center;
            font-weight: 500;
        }

        /* --- ÖZEL POP-UP SİSTEM UYARISI MODAL --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-box {
            background-color: #111827;
            border: 2px solid #ef4444;
            border-radius: 16px;
            width: 100%;
            max-width: 360px;
            padding: 25px;
            text-align: center;
            position: relative;
            animation: slideUpMenu 0.3s ease-out;
        }

        .modal-box.leaderboard-style {
            border-color: #d97706;
        }

        .modal-header {
            font-size: 18px;
            font-weight: bold;
            color: #ef4444;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .modal-header.gold-title {
            color: #d97706;
        }

        .modal-body-text {
            font-size: 14px;
            color: #d1d5db;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .modal-confirm-btn {
            width: 100%;
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        .modal-confirm-btn.gold-btn {
            background-color: #d97706;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #9ca3af;
            font-size: 22px;
            cursor: pointer;
        }

        .leaderboard-list {
            list-style: none;
            max-height: 250px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
        }

        .leaderboard-item {
            background-color: #1f2937;
            padding: 10px 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .no-data {
            color: #9ca3af;
            text-align: center;
            font-size: 13px;
            padding: 20px 0;
        }

        /* --- ANİMASYON TANIMLARI --- */
        @keyframes fadeInOverlay {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUpMenu {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInMsg {
            from { opacity: 0; transform: translateY(3px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="launch-menu-overlay">
        <div id="main-menu-panel" class="menu-box">
            <div class="menu-title">BATTLEZONE LIVE</div>
            <button class="menu-btn" onclick="showUsernamePanel()">YENI OYUN (YAYINA BAĞLAN)</button>
            <button class="menu-btn secondary" onclick="openLeaderboard()">🏆 BAŞARI SIRALAMASI</button>
        </div>

        <div id="username-panel" class="menu-box">
            <div class="menu-title">BATTLEZONE LIVE</div>
            <div class="input-group">
                <label>TIKTOK CANLI YAYIN KULLANICI ADI</label>
                <input type="text" id="initial-username" placeholder="Örn: yayinci_adi" autocomplete="off">
            </div>
            <button class="menu-btn" id="connect-trigger-btn" onclick="requestTikTokLiveConnection()">YAYINI DOĞRULA & BAŞLAT ⚔️</button>
            <button class="menu-btn secondary" style="background: #374151;" onclick="goBackToMainMenu()">← GERI DÖN</button>
        </div>
    </div>

    <div class="game-container">
        <div class="top-bar">
            <div class="brand" id="live-streamer-name">YAYINCI <span style="color:white; font-size:11px; background:#dc2626; padding:2px 6px; border-radius:4px; margin-left:5px;">CANLI</span></div>
            <div class="status-badge" id="status-text">BAĞLANTI YOK</div>
            <button class="exit-btn" onclick="window.location.reload();">Çıkış</button>
        </div>

        <div class="chat-section">
            <div class="chat-title">💬 CANLI SOHBET AKIŞI</div>
            <div class="chat-messages" id="chat-box-stream">
                <div class="no-data" id="chat-placeholder" style="padding: 10px 0;">Henüz gelen yorum yok...</div>
            </div>
        </div>

        <div class="map-section">
            <div class="map-grid" id="map-grid-container"></div>
        </div>
    </div>

    <div class="modal-overlay" id="system-alert-modal">
        <div class="modal-box">
            <div class="modal-header">SİSTEM UYARISI</div>
            <div class="modal-body-text" id="system-alert-text">Bağlantı sağlanamadı. Girdiğiniz kullanıcı canlı yayında olmayabilir.</div>
            <button class="modal-confirm-btn" onclick="closeSystemAlert()">TAMAM</button>
        </div>
    </div>

    <div class="modal-overlay" id="leaderboard-modal">
        <div class="modal-box leaderboard-style">
            <button class="close-modal" onclick="closeLeaderboard()">×</button>
            <div class="modal-header gold-title">🏆 BAŞARI SIRALAMASI</div>
            <ul class="leaderboard-list" id="leaderboard-list-render">
                <li class="no-data">Aktif oyuncu verisi bulunmuyor.</li>
            </ul>
            <button class="modal-confirm-btn gold-btn" style="margin-top:15px;" onclick="closeLeaderboard()">KAPAT</button>
        </div>
    </div>

    <script>
        const mapRegions = {};
        const leaderboardData = {};

        function createMapGrid() {
            const container = document.getElementById("map-grid-container");
            container.innerHTML = "";
            for (let i = 1; i <= 80; i++) {
                mapRegions[i] = { owner: null, color: null };
                const btn = document.createElement("button");
                btn.className = "region-btn";
                btn.id = `region-${i}`;
                btn.innerHTML = `<span class="reg-num">${i}</span><span class="reg-user"></span>`;
                container.appendChild(btn);
            }
        }

        function showUsernamePanel() {
            document.getElementById("main-menu-panel").style.display = "none";
            document.getElementById("username-panel").style.display = "block";
        }

        function goBackToMainMenu() {
            document.getElementById("username-panel").style.display = "none";
            document.getElementById("main-menu-panel").style.display = "block";
        }

        function openLeaderboard() {
            document.getElementById("leaderboard-modal").style.display = "flex";
        }

        function closeLeaderboard() {
            document.getElementById("leaderboard-modal").style.display = "none";
        }

        // Özel Pop-up Uyarı Tetikleyicileri
        function showSystemAlert(message) {
            document.getElementById("system-alert-text").innerText = message;
            document.getElementById("system-alert-modal").style.display = "flex";
        }

        function closeSystemAlert() {
            document.getElementById("system-alert-modal").style.display = "none";
            const btn = document.getElementById("connect-trigger-btn");
            btn.innerText = "YAYINI DOĞRULA & BAŞLAT ⚔️";
            btn.disabled = false;
        }

        // Butona İlk Basıldığında Çalışan Doğrulama Mantığı
        function requestTikTokLiveConnection() {
            const inputField = document.getElementById("initial-username");
            const username = inputField.value.trim();

            // 1. Boş kontrolü ve Özel Pop-up uyarısı
            if (!username) {
                showSystemAlert("Lütfen geçerli bir TikTok kullanıcı adı girin!");
                return;
            }

            const btn = document.getElementById("connect-trigger-btn");
            btn.innerText = "YAYIN SORGULANIYOR...";
            btn.disabled = true;

            // Kodular köprüsüne ismi fırlat
            if (window.AppInventor) {
                window.AppInventor.setWebViewString(username);
            } else {
                // Bilgisayarda test ediyorsan direkt simüle etsin diye koruma alanı
                setTimeout(() => {
                    executeAppLaunch(username);
                }, 1000);
            }
        }

        // KODULAR TARAFINDAN ASIL TETİKLENECEK MOTOR FONKSİYON
        window.checkAndStartTikTok = function() {
            if (window.AppInventor) {
                const username = window.AppInventor.getWebViewString();
                if (username && username.trim() !== "") {
                    executeAppLaunch(username.trim());
                } else {
                    showSystemAlert("Bağlantı sağlanamadı. Girdiğiniz kullanıcı canlı yayında olmayabilir.");
                }
            }
        };

        // Oyunu Başlatan ve Arayüzü Düzenleyen Kısım
        function executeAppLaunch(username) {
            // Giriş ekranını kapat
            document.getElementById("launch-menu-overlay").style.display = "none";
            
            // Sol üstteki COOTV yazısını silip GİRİLEN KULLANICI ADINI yazıyoruz
            document.getElementById("live-streamer-name").innerHTML = `@${username.toUpperCase()} <span style="color:white; font-size:11px; background:#dc2626; padding:2px 6px; border-radius:4px; margin-left:5px;">CANLI</span>`;
            
            // Üst sağ durum rozetini güncelle
            const statusText = document.getElementById("status-text");
            statusText.innerText = "YAYINA BAĞLANDI";
            statusText.style.color = "#10b981";
        }

        // --- GELEN CHAT VE HEDİYE SİHRİBBAZLIĞI ---
        window.handleIncomingChat = function(user, comment) {
            const chatBox = document.getElementById("chat-box-stream");
            const placeholder = document.getElementById("chat-placeholder");
            if (placeholder) placeholder.remove();

            const msgDiv = document.createElement("div");
            msgDiv.className = "chat-msg";
            msgDiv.innerHTML = `<span class="chat-user">@${user}:</span> <span style="color:white;">${comment}</span>`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            const msg = comment.toLowerCase().trim();
            if (msg.startsWith("join ")) {
                const regionId = parseInt(msg.replace("join ", "").trim());
                if (regionId >= 1 && regionId <= 80) {
                    processRegionCapture(regionId, user);
                }
            }
        };

        window.handleIncomingGift = function(user, giftName) {
            const chatBox = document.getElementById("chat-box-stream");
            const placeholder = document.getElementById("chat-placeholder");
            if (placeholder) placeholder.remove();

            const msgDiv = document.createElement("div");
            msgDiv.className = "chat-msg";
            msgDiv.innerHTML = `<span class="chat-user" style="color:#f59e0b;">🎁 @${user}:</span> <span style="color:#f59e0b; font-weight:bold;">${giftName} gönderdi!</span>`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            
            for(let k = 0; k < 3; k++) {
                const randomRegion = Math.floor(Math.random() * 80) + 1;
                processRegionCapture(randomRegion, user);
            }
        };

        function processRegionCapture(regionId, username) {
            const regionBtn = document.getElementById(`region-${regionId}`);
            if (!regionBtn) return;

            let userColor = mapRegions[regionId].color;
            if (!userColor || mapRegions[regionId].owner !== username) {
                userColor = '#' + Math.floor(Math.random()*16777215).toString(16);
            }

            const oldOwner = mapRegions[regionId].owner;
            if (oldOwner && leaderboardData[oldOwner]) {
                leaderboardData[oldOwner]--;
                if (leaderboardData[oldOwner] <= 0) delete leaderboardData[oldOwner];
            }

            mapRegions[regionId] = { owner: username, color: userColor };
            regionBtn.style.backgroundColor = userColor;
            
            const userSpan = regionBtn.querySelector(".reg-user");
            if (userSpan) userSpan.innerText = username;

            if (!leaderboardData[username]) leaderboardData[username] = 0;
            leaderboardData[username]++;

            renderLeaderboardHtml();
        }

        function renderLeaderboardHtml() {
            const listContainer = document.getElementById("leaderboard-list-render");
            if (!listContainer) return;

            listContainer.innerHTML = "";
            const sortedPlayers = Object.entries(leaderboardData).sort((a, b) => b[1] - a[1]);

            if (sortedPlayers.length === 0) {
                listContainer.innerHTML = '<li class="no-data">Aktif oyuncu verisi bulunmuyor.</li>';
                return;
            }

            sortedPlayers.forEach(([player, score], index) => {
                const li = document.createElement("li");
                li.className = "leaderboard-item";
                li.innerHTML = `<span>${index + 1}. @${player}</span> <strong>${score} Bölge</strong>`;
                listContainer.appendChild(li);
            });
        }

        window.onload = function() {
            createMapGrid();
        };
    </script>
</body>
</html>
