<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Warzone Real Map System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        body { background-color: #06090e; color: #f1f5f9; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }
        
        .map-frame {
            width: 100%;
            max-width: 450px;
            background: #0b111a;
            border: 3px solid #1e293b;
            border-radius: 16px;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* FOTOĞRAFTAKİ BÜTÜNÜ BOZULMAYAN ASKEREİ HARİTA ALANI */
        .canvas-container {
            width: 100%;
            position: relative;
            background: #020617;
            border-radius: 12px;
            overflow: hidden;
        }

        svg { width: 100%; height: 100%; display: block; }

        /* Sektörlerin kendi çizgileri ve yapboz birleşimi */
        .warzone-sector {
            stroke: #0f172a; /* Sektörleri ayıran net askeri çizgiler */
            stroke-width: 1.5;
            cursor: pointer;
            transition: fill 0.3s ease, stroke 0.2s;
        }
        .warzone-sector:hover {
            filter: brightness(1.2);
            stroke: #ffffff;
        }

        /* NUMARALARI TAM BÖLGELERİN ORTASINA ÇAKAN KATMAN */
        .labels-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .sector-number {
            position: absolute;
            transform: translate(-50%, -50%);
            font-size: 11px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 1px 1px 2px #000, -1px -1px 2px #000;
        }

        /* TIKLAMA / ELE GEÇİRME EFEKTİ */
        @keyframes sectorBlast {
            0% { filter: brightness(1); }
            50% { filter: brightness(2); }
            100% { filter: brightness(1); }
        }
        .captured { animation: sectorBlast 0.4s ease-in-out; }
    </style>
</head>
<body>

    <div class="map-frame">
        <div class="canvas-container">
            <svg id="warzone-svg" viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
                <g id="sectors-group"></g>
            </svg>
            
            <div class="labels-layer" id="numbers-layer"></div>
        </div>
    </div>

    <script>
        const neonPalet = ['#ff0055', '#00ffcc', '#ccff00', '#ff9900', '#ff00ff', '#00ffff', '#33ff00', '#ff3300', '#9900ff', '#00ff66', '#ff00aa', '#3399ff', '#00e5ff', '#ff3d00'];

        document.addEventListener("DOMContentLoaded", () => {
            const svgGrup = document.getElementById("sectors-group");
            const sayiKatmani = document.getElementById("numbers-layer");

            // 1'den 100'e kadar olan sayıları karıştır
            let sayilar = Array.from({length: 100}, (_, i) => i + 1);
            sayilar.sort(() => Math.random() - 0.5);

            // Fotoğraftaki o karemsi/yapboz askeri harita düzenini oluşturan matematiksel grid sistemi (10x10 = 100 Bölge)
            let index = 0;
            const sutunSayisi = 10;
            const satirSayisi = 10;
            const genislik = 1000 / sutunSayisi;
            const yukseklik = 700 / satirSayisi;

            for (let sat = 0; sat < satirSayisi; sat++) {
                for (let sut = 0; sut < sutunSayisi; sut++) {
                    let numara = sayilar[index];
                    let rastgeleRenk = neonPalet[Math.floor(Math.random() * neonPalet.length)];

                    // Her bir sektörün köşe koordinatları (Birbirine yapışık nizam)
                    let x1 = sut * genislik;
                    let y1 = sat * yukseklik;
                    let x2 = x1 + genislik;
                    let y2 = y1 + yukseklik;

                    // Yapboz efekti vermek için sınırlara askeri asimetrik kıvrımlar ekliyoruz
                    let sapmaX = (sat % 2 === 0) ? 5 : -5;
                    let sapmaY = (sut % 2 === 0) ? 5 : -5;
                    if (sut === 0 || sut === sutunSayisi - 1) sapmaX = 0;
                    if (sat === 0 || sat === satirSayisi - 1) sapmaY = 0;

                    let dYolu = `M ${x1} ${y1} L ${x2 + sapmaX} ${y1} L ${x2} ${y2} L ${x1} ${y2 + sapmaY} Z`;

                    // Sektörün kendisini SVG path olarak haritaya ekliyoruz (Ayrı resim değil, haritanın kendisi)
                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    path.setAttribute("d", dYolu);
                    path.setAttribute("class", "warzone-sector");
                    path.setAttribute("id", `sector-${numara}`);
                    path.style.fill = rastgeleRenk;

                    // Sektöre tıklanınca rengini değiştirme testi
                    path.addEventListener("click", () => {
                        path.classList.add("captured");
                        setTimeout(() => path.classList.remove("captured"), 400);
                        path.style.fill = neonPalet[Math.floor(Math.random() * neonPalet.length)];
                    });

                    svgGrup.appendChild(path);

                    // Sayıyı tam bölgenin orta merkezine çakıyoruz
                    const merkezX = x1 + genislik / 2;
                    const merkezY = y1 + yukseklik / 2;

                    const label = document.createElement("div");
                    label.className = "sector-number";
                    label.style.left = `${(merkezX / 1000) * 100}%`;
                    label.style.top = `${(merkezY / 700) * 100}%`;
                    label.innerHTML = `<span>${numara}</span>`;

                    sayiKatmani.appendChild(label);
                    index++;
                }
            }
        });
    </script>
</body>
</html>
