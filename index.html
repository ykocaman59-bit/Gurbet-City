<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Canlı Yayın Savaş Motoru - Parlak Neon Versiyon</title>
    <script src="https://cdn.jsdelivr.net/npm/@node-it/tiktok-live-connector-browser@1.0.0/dist/tiktok-live-connector.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial Black', sans-serif; user-select: none; }
        body { background: #02040a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; padding: 10px; overflow-x: hidden; }

        /* YAYINCI ANA KONTROL PANELİ */
        #streamer-panel {
            background: #090d16; padding: 12px; border-radius: 12px; border: 2px solid #ff0050;
            margin-bottom: 12px; display: flex; flex-direction: column; gap: 10px;
            box-shadow: 0 0 15px rgba(255, 0, 80, 0.3);
        }
        .panel-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        input { background: #131a26; color: white; border: 1px solid #243249; padding: 6px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        
        .btn-connect { background: #ff0050; color: white; border: none; padding: 6px 14px; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 12px; text-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .btn-reset { background: #00f0ff; border: none; color: #000; padding: 6px 14px; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 12px; margin-left: auto; box-shadow: 0 0 10px rgba(0, 240, 255, 0.4); }

        /* HEDİYE ASKER AYARLARI KUTULARI */
        .gift-settings {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px;
            background: #131a26; padding: 10px; border-radius: 8px; border: 1px solid #243249;
        }
        .gift-input-group { display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: #ffbc00; }
        .gift-input-group input { width: 100%; text-align: center; font-weight: bold; color: #00ffcc; background: #090d16; }

        /* DEV HARİTA ALANI (MAKSİMUM KONTRAST) */
        #map-container {
            width: 100%; background: #05070f;
            border: 3px solid #1a2333; border-radius: 12px; position: relative;
            margin-bottom: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }
        canvas { display: block; width: 100%; height: 100%; }

        /* GRID PANELLER */
        #bottom-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
        .box { background: #090d16; border: 1px solid #1a2333; border-radius: 8px; padding: 10px; }
        .box h3 { font-size: 13px; color: #ffbc00; border-bottom: 2px solid #1a2333; padding-bottom: 4px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .list-item { display: flex; justify-content: space-between; font-size: 12px; padding: 5px 8px; background: #131a26; margin-bottom: 4px; border-radius: 4px; border-left: 3px solid #ffbc00; }
        #chat-flow { max-height: 110px; overflow-y: auto; font-size: 11px; min-height: 80px; }
        .chat-msg { margin-bottom: 4px; border-left: 3px solid #00f0ff; padding-left: 6px; background: rgba(0, 240, 255, 0.03); padding: 3px; }
        .chat-msg.gift-msg { border-left: 3px solid #ff007f; background: rgba(255, 0, 127, 0.1); }
        .chat-msg .username { color: #00f0ff; font-weight: bold; }
        .chat-msg .cmd { color: #fff; }
        .chat-msg .gift-highlight { color: #ff007f; font-weight: bold; text-shadow: 0 0 5px #ff007f; }

        #rules-bar {
            grid-column: 1 / -1; background: #090d16; border: 1px solid #ffbc00;
            border-radius: 8px; padding: 8px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; text-align: center;
        }
        .rule-card h4 { color: #ffbc00; font-size: 11px; margin-bottom: 2px; }
        .rule-card p { color: #a0aec0; font-size: 10px; font-weight: bold; }

        @media (max-width: 480px) { #rules-bar { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <div id="streamer-panel">
        <div class="panel-row">
            <input type="text" id="ttAccount" placeholder="@TikTokKullaniciAdi">
            <button class="btn-connect" onclick="connectTikTokLive()">Yayına Bağlan</button>
            <span id="status-text" style="color:#ff3b30; font-size:11px; font-weight:bold; letter-spacing: 1px;">BAĞLANTI YOK</span>
            <button class="btn-reset" onclick="clearMap()">Sıfırla & Renkleri Karıştır</button>
        </div>
        
        <div class="gift-settings">
            <div class="gift-input-group">
                <label>🌹 Gül Askeri</label>
                <input type="number" id="g_rose" value="50">
            </div>
            <div class="gift-input-group">
                <label>🎵 TikTok Askeri</label>
                <input type="number" id="g_tiktok" value="100">
            </div>
            <div class="gift-input-group">
                <label>💸 Para Yağmuru</label>
                <input type="number" id="g_money" value="500">
            </div>
            <div class="gift-input-group">
                <label>🦁 Aslan Askeri</label>
                <input type="number" id="g_lion" value="1000">
            </div>
            <div class="gift-input-group">
                <label>🌌 Evren Askeri</label>
                <input type="number" id="g_universe" value="2000">
            </div>
        </div>
    </div>

    <div id="map-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="bottom-layout">
        <div class="box">
            <h3>🏆 Canlı Skor Sıralaması</h3>
            <div id="leaderboard"></div>
        </div>

        <div class="box">
            <h3>💬 Canlı Yayın ve Hediye Akışı</h3>
            <div id="chat-flow"></div>
        </div>

        <div class="box">
            <h3>🤝 Diploması & İttifaklar</h3>
            <div id="alliances-list" style="font-size: 12px; color: #00f0ff; font-weight: bold;">Henüz ittifak yok...</div>
        </div>

        <div id="rules-bar">
            <div class="rule-card"><h4>BÖLGE ALMAK</h4><p>join [bölge_no]</p></div>
            <div class="rule-card"><h4>SALDIRI BAŞLAT</h4><p>attack [bölge_no]</p></div>
            <div class="rule-card"><h4>EKRANA TIKLA</h4><p>10 Beğeni = +1 Asker</p></div>
            <div class="rule-card"><h4>ORDU DESTEĞİ</h4><p>Gül / Aslan Gönder</p></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let regions = {};
        let players = {};
        let alliances = [];
        let playerLikes = {};

        const hexRadius = 26; 
        const hexHeight = hexRadius * Math.sqrt(3);
        const cols = 10;
        const rows = 10;

        function initGame() {
            regions = {};
            let id = 1;

            // PARLAKLIK DEVRİMİ: Spektrumu ve renk tonlarını tamamen neon seviyesine çekiyoruz
            let randomHueOffset = Math.floor(Math.random() * 360); 
            let randomStep = Math.floor(Math.random() * 20) + 15; 

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (id <= 100) {
                        let x = c * hexRadius * 1.5 + hexRadius;
                        let y = r * hexHeight + (c % 2 * hexHeight / 2) + hexHeight / 2;
                        
                        let computedHue = (randomHueOffset + (id * randomStep)) % 360;
                        
                        // PARLAK VE DOYGUN NEON RENK AYARLARI (Doygunluk %95, Parlaklık %45'e çekildi)
                        let defaultColor = `hsl(${computedHue}, 95%, 42%)`; 
                        let activeColor = `hsl(${computedHue}, 100%, 50%)`;  
                        
                        regions[id] = { 
                            id: id, x: x, y: y, owner: null, army: 0, maxArmy: 0, underAttack: false,
                            defaultColor: defaultColor, activeColor: activeColor
                        };
                        id++;
                    }
                }
            }
            resizeContainer();
        }

        function resizeContainer() {
            const container = document.getElementById('map-container');
            const totalWidth = cols * hexRadius * 1.5 + hexRadius;
            const totalHeight = rows * hexHeight + (hexHeight / 2);
            const screenWidth = container.clientWidth;
            const scaleFactor = screenWidth / totalWidth;
            
            canvas.width = screenWidth;
            canvas.height = totalHeight * scaleFactor;
            container.style.height = canvas.height + "px";

            drawMap(scaleFactor);
        }
        window.addEventListener('resize', resizeContainer);

        function drawMap(scale) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.scale(scale, scale);

            for (let i = 1; i <= 100; i++) {
                let reg = regions[i];
                ctx.beginPath();
                for (let j = 0; j < 6; j++) {
                    let angle = j * Math.PI / 3;
                    ctx.lineTo(reg.x + hexRadius * Math.cos(angle), reg.y + hexRadius * Math.sin(angle));
                }
                ctx.closePath();

                // IŞIK VE PARLAMA SİMÜLASYONU MOTORU
                if (reg.owner) {
                    ctx.save();
                    ctx.shadowBlur = 15; // Hücrenin etrafına neon parlama çizgisi atar
                    ctx.shadowColor = reg.activeColor;
                    ctx.fillStyle = reg.activeColor;
                    ctx.fill();
                    ctx.restore();
                } else {
                    // Boş hücreler mat değil, hafif transparan parlaklıkta durur
                    ctx.fillStyle = reg.defaultColor;
                    ctx.globalAlpha = 0.55;
                    ctx.fill();
                    ctx.globalAlpha = 1.0; // Ayarı eski haline döndür
                }

                // HÜCRE ÇİZGİLERİ VE KUŞATMA EFEKTLERİ
                if (reg.underAttack && reg.army > 0 && reg.army < (reg.maxArmy * 0.35)) {
                    ctx.strokeStyle = Math.random() > 0.5 ? '#ff003c' : '#ffaa00';
                    ctx.lineWidth = 4;
                } else {
                    ctx.strokeStyle = reg.owner ? '#ffffff' : 'rgba(255,255,255,0.25)';
                    ctx.lineWidth = reg.owner ? 2.5 : 1.2;
                }
                ctx.stroke();

                // SAYI NUMARALARI (Görünürlük için Text Shadow taklidi ve Kalın Yazı)
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                
                // Siyah gölge (Yazının arkasında kontrast sağlamak için)
                ctx.fillStyle = '#000000';
                ctx.fillText(reg.id, reg.x + 1, reg.y - 5); 
                
                // Ön asıl yazı
                ctx.fillStyle = '#ffffff';
                ctx.fillText(reg.id, reg.x, reg.y - 6);

                // OYUNCU ADI VE CANLI ORDU KÜNYESİ
                if (reg.owner) {
                    ctx.font = '900 10px Arial';
                    ctx.fillStyle = '#000000';
                    ctx.fillText(reg.owner.substring(0, 7), reg.x + 1, reg.y + 5);
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText(reg.owner.substring(0, 7), reg.x, reg.y + 4);

                    ctx.font = 'bold 10px Arial';
                    let isLow = (reg.underAttack && reg.army < (reg.maxArmy * 0.35));
                    ctx.fillStyle = '#000000';
                    ctx.fillText(`⚔️${Math.floor(reg.army)}`, reg.x + 1, reg.y + 15);
                    ctx.fillStyle = isLow ? '#ff3b30' : '#00ffcc'; // Canı azsa parlak kırmızı, çoksa neon yeşil
                    ctx.fillText(`⚔️${Math.floor(reg.army)}`, reg.x, reg.y + 14);
                }
            }
            ctx.restore();
        }

        function checkAndRegisterPlayer(user) {
            if (!players[user]) {
                let randHue = Math.floor(Math.random() * 360);
                players[user] = { color: `hsl(${randHue}, 100%, 50%)` };
            }
        }

        function handleTikTokChat(user, message) {
            user = user.trim(); message = message.trim();
            if (!user || !message) return;

            let lowerMsg = message.toLowerCase();
            checkAndRegisterPlayer(user);

            if (lowerMsg.startsWith('join ')) {
                let id = parseInt(lowerMsg.replace('join ', ''));
                if (id >= 1 && id <= 100 && !regions[id].owner) {
                    regions[id].owner = user;
                    regions[id].army = 50; regions[id].maxArmy = 50;
                    pushLog(user, `${id} numaralı parlak bölgeyi fethetti!`, false);
                    refreshUI();
                }
            }
            else if (lowerMsg === '99') {
                let reinforced = false;
                for (let i = 1; i <= 100; i++) {
                    if (regions[i].owner === user) {
                        regions[i].army += 20;
                        if (regions[i].army > regions[i].maxArmy) regions[i].maxArmy = regions[i].army;
                        reinforced = true;
                    }
                }
                if (reinforced) { refreshUI(); }
            }
            else if (lowerMsg.startsWith('attack ')) {
                let id = parseInt(lowerMsg.replace('attack ', ''));
                if (id >= 1 && id <= 100) startSiegeEngine(user, id);
            }
            else if (lowerMsg === 'all attack') {
                for (let i = 1; i <= 100; i++) {
                    if (regions[i].owner && regions[i].owner !== user) startSiegeEngine(user, i);
                }
            }
            else if (lowerMsg.startsWith('ittifak ')) {
                let id = parseInt(lowerMsg.replace('ittifak ', ''));
                if (id >= 1 && id <= 100) {
                    let allyTarget = regions[id].owner;
                    if (allyTarget && allyTarget !== user) {
                        if (!alliances.some(p => p.includes(user) && p.includes(allyTarget))) {
                            alliances.push([user, allyTarget]);
                            document.getElementById('alliances-list').innerHTML = '🤝 İttifaklar: ';
                            alliances.forEach(p => { document.getElementById('alliances-list').innerHTML += `[${p[0]}-${p[1]}] `; });
                        }
                    }
                }
            }
        }

        function handleTikTokGift(user, giftName) {
            checkAndRegisterPlayer(user);
            let armyCount = 0;
            let formattedName = giftName.toLowerCase();

            if (formattedName.includes("rose") || formattedName.includes("gül")) {
                armyCount = parseInt(document.getElementById('g_rose').value) || 50;
            } else if (formattedName.includes("tiktok")) {
                armyCount = parseInt(document.getElementById('g_tiktok').value) || 100;
            } else if (formattedName.includes("money") || formattedName.includes("yağmur") || formattedName.includes("para")) {
                armyCount = parseInt(document.getElementById('g_money').value) || 500;
            } else if (formattedName.includes("lion") || formattedName.includes("aslan")) {
                armyCount = parseInt(document.getElementById('g_lion').value) || 1000;
            } else if (formattedName.includes("universe") || formattedName.includes("evren") || formattedName.includes("galaksi")) {
                armyCount = parseInt(document.getElementById('g_universe').value) || 2000;
            } else {
                armyCount = 30;
            }

            pushLog(user, `Hediye Gönderdi: ${giftName} (+${armyCount} Ordu!)`, true);

            let added = false;
            for (let i = 1; i <= 100; i++) {
                if (regions[i].owner === user) {
                    regions[i].army += armyCount;
                    if (regions[i].army > regions[i].maxArmy) regions[i].maxArmy = regions[i].army;
                    added = true;
                }
            }

            if (!added) {
                let emptyRegs = Object.values(regions).filter(r => r.owner === null);
                if (emptyRegs.length > 0) {
                    let randomSelected = emptyRegs[Math.floor(Math.random() * emptyRegs.length)];
                    randomSelected.owner = user;
                    randomSelected.army = armyCount;
                    randomSelected.maxArmy = armyCount;
                }
            }
            refreshUI();
        }

        function handleTikTokLike(user, likeCount) {
            checkAndRegisterPlayer(user);
            if (!playerLikes[user]) playerLikes[user] = 0;
            playerLikes[user] += likeCount;

            if (playerLikes[user] >= 10) {
                let addedUnits = Math.floor(playerLikes[user] / 10);
                playerLikes[user] %= 10;

                let hasRegion = false;
                for (let i = 1; i <= 100; i++) {
                    if (regions[i].owner === user) {
                        regions[i].army += addedUnits;
                        if (regions[i].army > regions[i].maxArmy) regions[i].maxArmy = regions[i].army;
                        hasRegion = true;
                    }
                }
                if (hasRegion) refreshUI();
            }
        }

        function startSiegeEngine(attacker, targetId) {
            let target = regions[targetId];
            if (!target.owner || target.owner === attacker) return;
            if (alliances.some(p => p.includes(attacker) && p.includes(target.owner))) return;

            let attackWavePower = 0;
            for (let i = 1; i <= 100; i++) {
                if (regions[i].owner === attacker && regions[i].army > 20) {
                    let force = Math.floor(regions[i].army / 3);
                    regions[i].army -= force;
                    attackWavePower += force;
                }
            }

            if (attackWavePower <= 0) return;
            target.underAttack = true;

            let siegeInterval = setInterval(() => {
                if (attackWavePower <= 0 || target.owner === attacker || target.army <= 0) {
                    clearInterval(siegeInterval);
                    target.underAttack = false;
                    refreshUI();
                    return;
                }

                let attackDamage = Math.min(6, attackWavePower);
                attackWavePower -= attackDamage;
                target.army -= (attackDamage * 0.82);

                if (target.army <= 0) {
                    clearInterval(siegeInterval);
                    target.owner = attacker;
                    target.army = Math.max(15, attackWavePower);
                    target.maxArmy = target.army;
                    target.underAttack = false;
                    pushLog(attacker, `${targetId} numaralı kaleyi fethetti!`, false);
                }
                refreshUI();
            }, 230);
        }

        function refreshUI() {
            resizeContainer();
            let lb = document.getElementById('leaderboard'); lb.innerHTML = '';
            let scoreboard = {};
            for (let i = 1; i <= 100; i++) {
                if (regions[i].owner) scoreboard[regions[i].owner] = (scoreboard[regions[i].owner] || 0) + regions[i].army;
            }
            Object.entries(scoreboard).sort((a,b) => b[1] - a[1]).slice(0, 5).forEach(([name, army]) => {
                let pColor = players[name] ? players[name].color : '#fff';
                lb.innerHTML += `<div class="list-item"><span><b style="color:${pColor}">■</b> ${name}</span><span style="color:#00ffcc; font-weight:bold;">${Math.floor(army)} Asker</span></div>`;
            });
        }

        function pushLog(user, text, isGift) {
            const flow = document.getElementById('chat-flow');
            let m = document.createElement('div');
            m.className = isGift ? "chat-msg gift-msg" : "chat-msg";
            if (isGift) {
                m.innerHTML = `<span class="username">🎁 ${user}</span> <span class="gift-highlight">${text}</span>`;
            } else {
                m.innerHTML = `<span class="username">${user}</span>: <span class="cmd">${text}</span>`;
            }
            flow.appendChild(m);
            if (flow.childNodes.length > 5) flow.removeChild(flow.firstChild);
            flow.scrollTop = flow.scrollHeight;
        }

        function clearMap() { 
            players = {}; alliances = []; playerLikes = {}; 
            initGame(); 
        }

        function connectTikTokLive() {
            let account = document.getElementById('ttAccount').value.trim();
            if(!account) { alert("Lütfen TikTok kullanıcı adınızı girin!"); return; }
            
            let status = document.getElementById('status-text');
            status.innerText = "BAĞLANILIYOR..."; status.style.color = "#ffbc00";

            let connection = new TikTokLiveConnector(account);

            connection.on('chat', data => { handleTikTokChat(data.uniqueId, data.comment); });
            connection.on('gift', data => { handleTikTokGift(data.uniqueId, data.giftName); });
            connection.on('like', data => { handleTikTokLike(data.uniqueId, data.likeCount); });

            connection.on('connected', () => { status.innerText = "YAYIN AKTİF ✔"; status.style.color = "#00ffcc"; status.style.textShadow = "0 0 8px #00ffcc"; });
            connection.on('disconnected', () => { status.innerText = "BAĞLANTI KOPTU"; status.style.color = "#ff3b30"; });
        }

        initGame();
    </script>
</body>
</html>
